<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backend Dev Mastery</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #ff6b35;
    --accent3: #7c6aff;
    --text: #e2e2f0;
    --muted: #6b6b8a;
    --card: #13131f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid noise texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    padding: 48px 32px 32px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(0,255,136,0.04) 0%, transparent 100%);
  }

  .tag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: block;
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -1px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 12px;
    color: var(--muted);
    font-size: 15px;
    font-weight: 400;
    max-width: 500px;
  }

  .stats-bar {
    display: flex;
    gap: 32px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
  }

  .stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Search */
  .search-bar {
    position: relative;
    z-index: 1;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 220px;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 11px 14px 11px 38px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  .filter-btns {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 7px 14px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,255,136,0.06);
  }

  /* Layout */
  .layout {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 0;
  }

  /* Sidebar TOC */
  .toc {
    width: 220px;
    flex-shrink: 0;
    padding: 24px 20px;
    border-right: 1px solid var(--border);
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .toc-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .toc-item {
    display: block;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 2px;
    border: 1px solid transparent;
    text-decoration: none;
  }

  .toc-item:hover, .toc-item.active {
    color: var(--accent);
    border-color: var(--border);
    background: rgba(0,255,136,0.04);
  }

  .toc-dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    margin-right: 8px;
    vertical-align: middle;
  }

  /* Main content */
  .main {
    flex: 1;
    padding: 32px;
    overflow-y: auto;
    min-width: 0;
  }

  .category {
    margin-bottom: 56px;
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .category-icon {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .category-title {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .category-count {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }

  .terms-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }

  .term-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .term-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    border-radius: 8px 0 0 8px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .term-card:hover {
    border-color: rgba(0,255,136,0.3);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(0,255,136,0.06);
  }

  .term-card:hover::before { opacity: 1; background: var(--accent); }
  .term-card.c2::before { background: var(--accent2); }
  .term-card.c3::before { background: var(--accent3); }
  .term-card.c2:hover { border-color: rgba(255,107,53,0.3); }
  .term-card.c3:hover { border-color: rgba(124,106,255,0.3); }

  .term-name {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .term-card.c2 .term-name { color: var(--accent2); }
  .term-card.c3 .term-name { color: var(--accent3); }

  .term-def {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.55;
  }

  .term-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 10px;
  }

  .term-tag {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 3px;
    background: rgba(0,255,136,0.08);
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .term-card.c2 .term-tag {
    background: rgba(255,107,53,0.08);
    color: var(--accent2);
  }

  .term-card.c3 .term-tag {
    background: rgba(124,106,255,0.08);
    color: var(--accent3);
  }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
  }

  .progress-ring {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }

  .ring-track {
    height: 2px;
    flex: 1;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .ring-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  @media (max-width: 768px) {
    .toc { display: none; }
    .main { padding: 20px 16px; }
    .terms-grid { grid-template-columns: 1fr; }
    .stats-bar { gap: 20px; }
    header { padding: 32px 16px 24px; }
    .search-bar { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <span class="tag">// backend engineering reference</span>
  <h1>Backend Dev &amp;<br><span>CS Mastery Index</span></h1>
  <p class="subtitle">Every term, concept, and fundamental a senior backend engineer must command — from transistors to distributed systems. Java/Spring Boot oriented.</p>
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-num" id="total-count">0</span>
      <span class="stat-label">Total Terms</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="cat-count">0</span>
      <span class="stat-label">Categories</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="visible-count">0</span>
      <span class="stat-label">Showing</span>
    </div>
  </div>
</header>

<div class="search-bar">
  <div class="search-wrap">
    <span class="search-icon">&gt;_</span>
    <input type="text" id="search" placeholder="Search terms, concepts, keywords...">
  </div>
  <div class="filter-btns" id="filter-btns">
    <button class="filter-btn active" data-filter="all">All</button>
  </div>
</div>

<div class="layout">
  <nav class="toc" id="toc"></nav>
  <main class="main" id="main"></main>
</div>

<script>
const CATEGORIES = [
  {
    id: "core-java",
    title: "Core Java & OOP",
    icon: "☕",
    color: "c1",
    terms: [
      { name: "OOP (Object-Oriented Programming)", def: "Paradigm around objects with state (fields) and behavior (methods). Four pillars: Encapsulation, Abstraction, Inheritance, Polymorphism.", tags: ["foundation"] },
      { name: "Encapsulation", def: "Bundling data and methods together, hiding internal state via access modifiers (private, protected, public). Prevents accidental mutation.", tags: ["oop"] },
      { name: "Inheritance", def: "Child class acquiring fields and methods of parent via `extends`. Enables code reuse. Java supports single class inheritance, multiple via interfaces.", tags: ["oop"] },
      { name: "Polymorphism", def: "Same method name behaves differently based on object type. Runtime polymorphism via method overriding; compile-time via overloading.", tags: ["oop"] },
      { name: "Abstraction", def: "Hiding implementation details, exposing only essential behavior via abstract classes or interfaces. Reduces coupling.", tags: ["oop"] },
      { name: "Interface vs Abstract Class", def: "Interface = pure contract, multiple implement-able. Abstract class = partial implementation, single extendable. Use interface for capability, abstract for shared base.", tags: ["oop", "design"] },
      { name: "SOLID Principles", def: "S: Single Responsibility. O: Open/Closed. L: Liskov Substitution. I: Interface Segregation. D: Dependency Inversion. Cornerstone of maintainable OOP code.", tags: ["design", "interview"] },
      { name: "Generics", def: "Type-safe parameterized code. `List<T>`, `<T extends Comparable<T>>`. Avoids raw type casts. Enables reusable algorithms without type duplication.", tags: ["java"] },
      { name: "Collections Framework", def: "Hierarchy: Iterable → Collection → List/Set/Queue. Map is separate. Key: ArrayList (O(1) get), LinkedList (O(1) add/remove), HashMap (O(1) avg), TreeMap (sorted).", tags: ["java", "data-structures"] },
      { name: "HashMap Internals", def: "Array of buckets with linked list/tree (Java 8+). Hashing → index via `hashCode()` + `equals()`. Load factor 0.75. Resize doubles capacity.", tags: ["java", "interview"] },
      { name: "Concurrency & Multithreading", def: "Thread lifecycle: NEW, RUNNABLE, BLOCKED, WAITING, TIMED_WAITING, TERMINATED. synchronized, volatile, ReentrantLock for thread safety.", tags: ["java", "concurrency"] },
      { name: "ExecutorService & Thread Pools", def: "Manage thread lifecycle efficiently. Types: FixedThreadPool, CachedThreadPool, ScheduledThreadPool. Avoid raw `new Thread()` in production.", tags: ["java", "concurrency"] },
      { name: "CompletableFuture", def: "Async, non-blocking computation chains. `.thenApply()`, `.thenCompose()`, `.allOf()`. Replaces callback hell with fluent async pipelines.", tags: ["java", "async"] },
      { name: "Java Memory Model", def: "Stack (method frames, primitives), Heap (objects). GC: Young Gen → Old Gen → Metaspace. Understand GC pauses, memory leaks via retained references.", tags: ["java", "performance"] },
      { name: "Functional Interfaces & Lambdas", def: "Single abstract method interfaces (Predicate, Function, Supplier, Consumer). Lambdas are syntactic sugar for anonymous classes. Enables functional-style code.", tags: ["java8+"] },
      { name: "Stream API", def: "Functional data pipeline: filter → map → collect. Lazy evaluation, no side effects. `.stream()`, `.parallelStream()`. Collectors: toList, groupingBy, joining.", tags: ["java8+"] },
      { name: "Optional", def: "Container that may or may not hold a value. Eliminates NullPointerException if used properly. `.orElse()`, `.map()`, `.ifPresent()`. Don't use as method parameter.", tags: ["java8+"] },
      { name: "Checked vs Unchecked Exceptions", def: "Checked (IOException, SQLException): must be declared or caught. Unchecked (RuntimeException): optional. Spring convention: prefer unchecked in service layers.", tags: ["java"] },
      { name: "Serialization", def: "Converting object to byte stream for storage/transport. Java Serializable interface. JSON serialization via Jackson. Beware serialVersionUID changes breaking deserialization.", tags: ["java"] },
      { name: "Reflection API", def: "Inspect/modify class structure at runtime. `Class.forName()`, `.getDeclaredMethods()`. Foundation of Spring's DI and annotation processing. Performance cost — use judiciously.", tags: ["java", "advanced"] },
    ]
  },
  {
    id: "spring",
    title: "Spring Boot & Framework",
    icon: "🌱",
    color: "c2",
    terms: [
      { name: "Spring IoC Container", def: "Inversion of Control: framework manages object lifecycle and dependencies. ApplicationContext is the container. You declare what you need; Spring wires it.", tags: ["spring", "foundation"] },
      { name: "Dependency Injection (DI)", def: "Objects receive dependencies from outside (constructor, setter, field injection). Constructor injection preferred: immutable, testable, avoids circular dependencies.", tags: ["spring", "design"] },
      { name: "@Component / @Service / @Repository / @Controller", def: "Stereotype annotations registering beans in the container. @Repository adds persistence exception translation. @Service marks business logic. @Controller handles HTTP.", tags: ["spring", "annotations"] },
      { name: "@Autowired", def: "Injects bean by type. Prefer constructor injection over @Autowired field injection (better testability, immutability). @Qualifier disambiguates multiple beans of same type.", tags: ["spring", "annotations"] },
      { name: "Spring Bean Scopes", def: "Singleton (default, one per container), Prototype (new per request), Request, Session (web). Singleton is NOT thread-safe if mutable state is held.", tags: ["spring"] },
      { name: "Spring MVC Request Lifecycle", def: "Request → DispatcherServlet → HandlerMapping → Controller → Service → Repository → Response. Filters and Interceptors wrap the chain.", tags: ["spring", "web"] },
      { name: "@RestController / @RequestMapping", def: "@RestController = @Controller + @ResponseBody. @RequestMapping maps URLs to methods. Shortcuts: @GetMapping, @PostMapping, @PutMapping, @DeleteMapping, @PatchMapping.", tags: ["spring", "annotations"] },
      { name: "@PathVariable / @RequestParam / @RequestBody", def: "@PathVariable: from URL path `/users/{id}`. @RequestParam: from query string `?page=1`. @RequestBody: deserializes JSON body to object via Jackson.", tags: ["spring", "annotations"] },
      { name: "Spring Data JPA", def: "Abstraction over JPA/Hibernate. Extend JpaRepository<Entity, ID> and get CRUD for free. Derives queries from method names. @Query for JPQL/native SQL.", tags: ["spring", "data"] },
      { name: "Spring AOP", def: "Aspect-Oriented Programming. Cross-cutting concerns (logging, security, transactions) without cluttering business logic. @Aspect, @Around, @Before, @After, Pointcut expressions.", tags: ["spring", "advanced"] },
      { name: "@Transactional", def: "Declarative transaction management. Propagation (REQUIRED, REQUIRES_NEW), Isolation (READ_COMMITTED default), rollbackFor. Proxy-based — internal calls bypass it.", tags: ["spring", "data"] },
      { name: "Spring Security", def: "Authentication (who are you?) and Authorization (what can you do?). Filter chain based. JWT, OAuth2, Basic auth support. @PreAuthorize for method-level security.", tags: ["spring", "security"] },
      { name: "Spring Profiles", def: "@Profile(\"dev\") / @Profile(\"prod\"). `spring.profiles.active` in application.yml. Separate config, beans, and behavior per environment.", tags: ["spring", "config"] },
      { name: "application.yml / application.properties", def: "Externalized configuration. Hierarchy: default → profile-specific → env vars → command-line args. @Value injects single props; @ConfigurationProperties binds whole prefixes.", tags: ["spring", "config"] },
      { name: "Spring Boot Actuator", def: "Production-ready endpoints: /health, /metrics, /info, /env, /beans. Integrates with Prometheus/Grafana. Expose selectively — security risk if open.", tags: ["spring", "ops"] },
      { name: "Spring Batch", def: "Framework for batch processing: Job → Steps → ItemReader → ItemProcessor → ItemWriter. Chunk-based processing with retry, skip, and restart capabilities.", tags: ["spring", "advanced"] },
      { name: "Spring Cloud", def: "Microservices toolkit: Config Server, Eureka (discovery), Gateway, Circuit Breaker (Resilience4j), Feign clients, Sleuth (tracing). Built on Netflix OSS concepts.", tags: ["spring", "microservices"] },
      { name: "Spring WebFlux", def: "Reactive, non-blocking web framework using Project Reactor (Mono, Flux). For high-concurrency I/O-bound workloads. Different programming model from MVC.", tags: ["spring", "reactive"] },
      { name: "DTO Pattern", def: "Data Transfer Objects decouple API layer from domain model. Prevents over-exposing internal entity fields. Use MapStruct or ModelMapper for conversions.", tags: ["spring", "design"] },
      { name: "Exception Handling (@ControllerAdvice)", def: "@ControllerAdvice + @ExceptionHandler for global error handling. Return consistent error responses (status, code, message, timestamp). Don't expose stack traces externally.", tags: ["spring", "web"] },
    ]
  },
  {
    id: "databases",
    title: "Databases & Persistence",
    icon: "🗄️",
    color: "c3",
    terms: [
      { name: "ACID Properties", def: "Atomicity (all or nothing), Consistency (valid state transitions), Isolation (transactions don't interfere), Durability (committed data survives crashes). Foundation of relational DBs.", tags: ["database", "foundation"] },
      { name: "RDBMS vs NoSQL", def: "RDBMS: structured, ACID, joins, fixed schema (Postgres, MySQL, Oracle). NoSQL: flexible schema, horizontal scale, eventual consistency (MongoDB, Cassandra, Redis).", tags: ["database"] },
      { name: "Indexing", def: "B-Tree index: fast range queries. Hash index: exact lookups. Composite index: column order matters. Covering index. Too many indexes slow writes. `EXPLAIN ANALYZE` to verify usage.", tags: ["database", "performance"] },
      { name: "SQL Joins", def: "INNER: matching rows both sides. LEFT/RIGHT: all from one side + matches. FULL OUTER: all rows. CROSS: cartesian product. Understanding join execution is key for optimization.", tags: ["database", "sql"] },
      { name: "Normalization", def: "1NF (atomic values), 2NF (no partial dependencies), 3NF (no transitive dependencies). Over-normalization hurts read performance. Denormalize strategically for read-heavy workloads.", tags: ["database", "design"] },
      { name: "Transaction Isolation Levels", def: "READ UNCOMMITTED → READ COMMITTED → REPEATABLE READ → SERIALIZABLE. Higher isolation = fewer anomalies (dirty read, phantom read) but lower concurrency. Postgres default: READ COMMITTED.", tags: ["database", "advanced"] },
      { name: "ORM & JPA/Hibernate", def: "Maps Java objects to DB tables. EntityManager, persistence context, lazy vs eager loading. N+1 problem: use JOIN FETCH or @EntityGraph. First-level cache (session), second-level (EhCache).", tags: ["database", "java"] },
      { name: "Connection Pooling (HikariCP)", def: "Reuses DB connections instead of creating new ones per request. HikariCP is Spring Boot default. Tune: maximumPoolSize, connectionTimeout, idleTimeout per load profile.", tags: ["database", "performance"] },
      { name: "Database Migrations (Flyway/Liquibase)", def: "Version-controlled schema changes. Flyway: SQL/Java migrations with V1__desc.sql naming. Liquibase: XML/YAML changelogs. Critical for CI/CD pipelines.", tags: ["database", "devops"] },
      { name: "Cassandra Data Model", def: "Wide-column store, partition key determines node, clustering columns sort within partition. Design tables for query patterns (not relationships). No joins, no transactions across partitions.", tags: ["nosql", "cassandra"] },
      { name: "Redis", def: "In-memory data structure store. Use cases: caching, session storage, pub/sub, rate limiting, distributed locks (SETNX). TTL-based expiration. Persistence: RDB snapshots, AOF logs.", tags: ["nosql", "cache"] },
      { name: "CAP Theorem", def: "Distributed systems can guarantee only 2 of 3: Consistency, Availability, Partition Tolerance. CP (Cassandra config, HBase) vs AP (DynamoDB, Cassandra default). Partition tolerance is non-negotiable in distributed systems.", tags: ["distributed", "theory"] },
      { name: "Query Optimization", def: "Use EXPLAIN ANALYZE. Avoid SELECT *. Proper indexing, avoid functions on indexed columns in WHERE. Pagination via keyset (WHERE id > last) over OFFSET for large datasets.", tags: ["database", "performance"] },
      { name: "Sharding vs Replication", def: "Sharding: horizontal partitioning of data across nodes for scale. Replication: copies of same data across nodes for availability and read scale. Often used together.", tags: ["database", "distributed"] },
      { name: "Eventual Consistency", def: "In distributed systems, replicas may be temporarily inconsistent but converge given no new updates. Trade-off for availability and partition tolerance in AP systems.", tags: ["distributed", "theory"] },
    ]
  },
  {
    id: "apis",
    title: "APIs & Communication",
    icon: "🔌",
    color: "c1",
    terms: [
      { name: "REST Principles", def: "Stateless, client-server, uniform interface, cacheable, layered system. Resources identified by URIs. HTTP verbs: GET (read), POST (create), PUT (replace), PATCH (partial update), DELETE.", tags: ["api", "foundation"] },
      { name: "HTTP Status Codes", def: "2xx: success. 3xx: redirect. 4xx: client error (400 bad request, 401 unauth, 403 forbidden, 404 not found, 409 conflict, 422 unprocessable). 5xx: server error.", tags: ["api", "http"] },
      { name: "GraphQL", def: "Query language for APIs. Client specifies exactly what data it needs. Single endpoint. Resolvers fetch data. Avoids over-fetching/under-fetching. N+1 problem solved via DataLoader.", tags: ["api", "graphql"] },
      { name: "gRPC", def: "High-performance RPC framework using Protocol Buffers (protobuf) over HTTP/2. Strongly typed contracts. Streaming support. Faster than REST for inter-service communication.", tags: ["api", "rpc"] },
      { name: "OpenAPI / Swagger", def: "Specification for documenting REST APIs. Springdoc-openapi auto-generates from annotations. Machine-readable contract enables client generation, testing, and API governance.", tags: ["api", "docs"] },
      { name: "API Versioning", def: "Strategies: URI path (/v1/users), query param (?version=1), header (Accept-Version). Versioning prevents breaking changes for existing clients.", tags: ["api", "design"] },
      { name: "Rate Limiting", def: "Throttle requests per client to prevent abuse. Algorithms: Token Bucket (burst-friendly), Leaky Bucket (smooth), Sliding Window. Implement via Redis + Spring filter or API Gateway.", tags: ["api", "security"] },
      { name: "HATEOAS", def: "Hypermedia As The Engine Of Application State. REST responses include links to related actions. Level 3 of Richardson Maturity Model. Spring HATEOAS library provides support.", tags: ["api", "rest"] },
      { name: "Idempotency", def: "Repeated identical requests produce same result. GET, PUT, DELETE are idempotent. POST is not. Use idempotency keys for payment/mutation APIs to handle retries safely.", tags: ["api", "design"] },
      { name: "Webhooks", def: "Server pushes data to client URL on event. Reverse of polling. Producer sends HTTP POST to registered URL on event trigger. Implement with retry, signature verification.", tags: ["api", "async"] },
      { name: "CORS", def: "Cross-Origin Resource Sharing. Browser security mechanism restricting cross-domain requests. Configure `Access-Control-Allow-Origin` headers. Spring: @CrossOrigin or global WebMvcConfigurer.", tags: ["api", "security"] },
      { name: "Content Negotiation", def: "Client indicates preferred format via `Accept` header (application/json, application/xml). Server responds via `Content-Type`. Spring MVC handles via HttpMessageConverters.", tags: ["api", "http"] },
    ]
  },
  {
    id: "messaging",
    title: "Messaging & Event-Driven",
    icon: "📨",
    color: "c2",
    terms: [
      { name: "Message Broker", def: "Middleware decoupling producers from consumers. Examples: Kafka, RabbitMQ, ActiveMQ, AWS SQS. Enables async communication, buffering, and fan-out patterns.", tags: ["messaging", "foundation"] },
      { name: "Apache Kafka", def: "Distributed log. Producers write to topics, consumers read from partitions. Offset tracking enables replay. Guarantees ordering within partition. Retention-based (not deletion-based).", tags: ["kafka", "foundation"] },
      { name: "Kafka Topics & Partitions", def: "Topic = logical stream. Partition = ordered, immutable log. More partitions = more parallelism. Partition key determines which partition a message lands in.", tags: ["kafka"] },
      { name: "Consumer Groups", def: "Multiple consumers sharing a topic. Each partition consumed by one member per group. Rebalancing on join/leave. Use for horizontal scaling of consumers.", tags: ["kafka"] },
      { name: "Kafka KRaft Mode", def: "Kafka without Zookeeper (Kafka 3.x+). Metadata managed by Kafka controllers via Raft consensus. Simpler deployment, faster recovery. Production-ready from Kafka 3.3+.", tags: ["kafka", "advanced"] },
      { name: "At-Least-Once / At-Most-Once / Exactly-Once", def: "At-least-once: may duplicate (safe with idempotent consumers). At-most-once: may lose. Exactly-once: hardest, Kafka supports via transactional API + idempotent producer.", tags: ["messaging", "theory"] },
      { name: "Dead Letter Queue (DLQ)", def: "Messages that fail processing after retries go to DLQ for inspection. Essential for reliability. Prevents poison-pill messages blocking consumers.", tags: ["messaging", "reliability"] },
      { name: "Event Sourcing", def: "State derived from an immutable sequence of events rather than current state snapshots. Audit log is the source of truth. Enables time-travel debugging and projections.", tags: ["architecture", "messaging"] },
      { name: "CQRS", def: "Command Query Responsibility Segregation. Separate write model (commands) from read model (queries). Enables independent scaling and optimization of reads vs writes.", tags: ["architecture", "messaging"] },
      { name: "Saga Pattern", def: "Manages distributed transactions without 2PC. Choreography (events trigger next steps) or Orchestration (central coordinator). Compensating transactions handle failures.", tags: ["architecture", "microservices"] },
      { name: "RabbitMQ", def: "Traditional message broker with exchanges (direct, fanout, topic, headers) routing to queues. Push-based. Better for complex routing. Lower throughput than Kafka.", tags: ["messaging"] },
      { name: "Outbox Pattern", def: "Writes events to an outbox table within the same DB transaction as business data. A relay process publishes them to the broker. Guarantees no event loss on crash.", tags: ["messaging", "reliability"] },
    ]
  },
  {
    id: "microservices",
    title: "Microservices & Architecture",
    icon: "🏗️",
    color: "c3",
    terms: [
      { name: "Microservices vs Monolith", def: "Monolith: single deployable unit, simpler ops. Microservices: independently deployable services, polyglot, scale independently, complex ops. Don't start with microservices prematurely.", tags: ["architecture", "foundation"] },
      { name: "Service Discovery", def: "Services find each other without hardcoded URLs. Client-side: Eureka + Ribbon. Server-side: API Gateway + registry. Kubernetes: DNS-based discovery natively.", tags: ["microservices"] },
      { name: "API Gateway", def: "Single entry point for clients. Handles routing, auth, rate limiting, SSL termination, request aggregation. Spring Cloud Gateway, Kong, AWS API Gateway, NGINX.", tags: ["microservices"] },
      { name: "Circuit Breaker", def: "Prevents cascading failures. States: CLOSED (normal), OPEN (failing, reject requests), HALF_OPEN (test recovery). Resilience4j is Spring's standard. Configure with failure rate thresholds.", tags: ["microservices", "reliability"] },
      { name: "Bulkhead Pattern", def: "Isolate failures by partitioning resources (thread pools, semaphores) per downstream service. If one integration fails, it doesn't exhaust resources for others.", tags: ["microservices", "reliability"] },
      { name: "Service Mesh", def: "Infrastructure layer for service-to-service communication: mutual TLS, observability, traffic management, retry logic. Examples: Istio, Linkerd. Sidecar proxy pattern (Envoy).", tags: ["microservices", "advanced"] },
      { name: "12-Factor App", def: "Methodology for cloud-native apps: codebase, dependencies, config, backing services, build/release/run, processes, port binding, concurrency, disposability, dev/prod parity, logs, admin.", tags: ["architecture", "cloud"] },
      { name: "Strangler Fig Pattern", def: "Incrementally migrate monolith to microservices. New functionality built as services; gradually strangle old code until nothing remains. Safe, incremental migration.", tags: ["architecture", "migration"] },
      { name: "Anti-Corruption Layer (ACL)", def: "Translates between two domain models, preventing external model's concepts from leaking into your domain. Critical in legacy migration and third-party integrations.", tags: ["architecture", "design"] },
      { name: "Domain-Driven Design (DDD)", def: "Ubiquitous Language, Bounded Contexts, Aggregates, Entities, Value Objects, Domain Events, Repositories. Aligns software model with business domain.", tags: ["architecture", "design"] },
      { name: "Bounded Context", def: "Explicit boundary within which a domain model applies. Same term (e.g. 'Account') can mean different things in different bounded contexts. Microservices often align with bounded contexts.", tags: ["architecture", "ddd"] },
      { name: "Two-Phase Commit (2PC)", def: "Distributed transaction protocol with prepare and commit phases. Coordinator ensures all nodes agree. High latency, single point of failure. Mostly replaced by Saga pattern in microservices.", tags: ["distributed", "advanced"] },
    ]
  },
  {
    id: "security",
    title: "Security",
    icon: "🔐",
    color: "c1",
    terms: [
      { name: "Authentication vs Authorization", def: "AuthN: verify identity (who you are). AuthZ: verify permissions (what you can do). Authentication precedes authorization. JWT carries both identity and claims.", tags: ["security", "foundation"] },
      { name: "JWT (JSON Web Token)", def: "Header.Payload.Signature — base64 encoded, signed (not encrypted). Stateless. Validate signature, expiry (exp), issuer (iss). Don't store sensitive data in payload — it's readable.", tags: ["security", "jwt"] },
      { name: "OAuth2 / OpenID Connect", def: "OAuth2: authorization framework (delegated access). OIDC: identity layer on top of OAuth2. Flows: Authorization Code (web), Client Credentials (M2M), PKCE (mobile/SPA).", tags: ["security", "oauth"] },
      { name: "SQL Injection", def: "Attacker injects SQL via input. Prevention: parameterized queries / prepared statements. JPA/Hibernate uses them automatically. Never concatenate user input into SQL strings.", tags: ["security", "vulnerabilities"] },
      { name: "OWASP Top 10", def: "Most critical web app security risks: Injection, Broken Auth, Sensitive Data Exposure, XXE, Broken Access Control, Misconfiguration, XSS, Insecure Deserialization, Vuln Components, Insufficient Logging.", tags: ["security", "foundation"] },
      { name: "Encryption at Rest vs In Transit", def: "In Transit: TLS/HTTPS encrypts data over network. At Rest: encrypted storage (AES-256). Both required for sensitive data compliance (PCI-DSS, GDPR).", tags: ["security", "compliance"] },
      { name: "Password Hashing", def: "Never store plaintext passwords. Use bcrypt, argon2, or scrypt — slow by design to resist brute force. Spring Security BCryptPasswordEncoder implements this.", tags: ["security"] },
      { name: "CSRF (Cross-Site Request Forgery)", def: "Attacker tricks authenticated user into making unintended requests. Prevention: CSRF tokens, SameSite cookie attribute. REST APIs using JWT are generally safe (no cookies).", tags: ["security", "vulnerabilities"] },
      { name: "Secrets Management", def: "Never hardcode credentials. Use environment variables, Vault (HashiCorp), AWS Secrets Manager, or Kubernetes Secrets. Spring Cloud Vault integrates with Spring apps.", tags: ["security", "devops"] },
      { name: "Principle of Least Privilege", def: "Entities (users, services, processes) should have only minimum permissions needed. DB users shouldn't be DBA. Service accounts scoped to required resources only.", tags: ["security", "design"] },
      { name: "mTLS (Mutual TLS)", def: "Both client and server present certificates to verify each other. Used in service mesh for zero-trust service-to-service auth. Stronger than one-way TLS.", tags: ["security", "advanced"] },
    ]
  },
  {
    id: "performance",
    title: "Performance & Scalability",
    icon: "⚡",
    color: "c2",
    terms: [
      { name: "Caching Strategies", def: "Cache-aside (app checks cache first), Write-through (write cache + DB), Write-behind (async DB write), Read-through. Invalidation is the hardest problem. TTL + event-based invalidation.", tags: ["performance", "caching"] },
      { name: "Horizontal vs Vertical Scaling", def: "Vertical: bigger machine (CPU, RAM). Horizontal: more machines behind load balancer. Horizontal preferred for fault tolerance. Stateless services scale horizontally easily.", tags: ["scalability"] },
      { name: "Load Balancing", def: "Distributes traffic across instances. Algorithms: Round Robin, Least Connections, IP Hash (session affinity). L4 (TCP) vs L7 (HTTP/application-aware). NGINX, HAProxy, AWS ELB.", tags: ["scalability"] },
      { name: "Lazy Loading vs Eager Loading", def: "Lazy: load related data on access (default JPA). Eager: load immediately with parent. Lazy can cause N+1 in loops. Use JOIN FETCH or @EntityGraph to batch-load when needed.", tags: ["performance", "jpa"] },
      { name: "N+1 Query Problem", def: "1 query to fetch N entities + N queries for each relation. Solution: JOIN FETCH, @BatchSize, @EntityGraph, or DTO projections with a single query.", tags: ["performance", "database"] },
      { name: "Async Processing", def: "Offload work to background threads/queues. @Async (Spring), CompletableFuture, message queues. Improves response time for long operations like email sending, report generation.", tags: ["performance", "async"] },
      { name: "Profiling & APM", def: "JProfiler, VisualVM for Java profiling. APM: Dynatrace, New Relic, Datadog. Identify CPU hotspots, memory leaks, slow queries, thread contention before optimizing.", tags: ["performance", "observability"] },
      { name: "CDN (Content Delivery Network)", def: "Serves static assets from edge nodes close to users. Reduces latency, origin server load. For APIs, CDN can cache GET responses with proper cache-control headers.", tags: ["performance", "infrastructure"] },
      { name: "Back-pressure", def: "Mechanism for consumers to signal producers to slow down. Prevents buffer overflow and OOM. Reactive streams (Project Reactor) handle back-pressure natively.", tags: ["performance", "reactive"] },
      { name: "JVM Tuning", def: "Heap sizing (-Xms, -Xmx), GC selection (G1GC default, ZGC for low latency), GC logging, heap dumps. Monitor with JConsole/Actuator. Tune based on profiling data, not guesses.", tags: ["performance", "java"] },
      { name: "Database Read Replicas", def: "Read-heavy workloads: route read queries to replicas, writes to primary. Spring: @Transactional(readOnly=true) + AbstractRoutingDataSource pattern. Replication lag is the key consideration.", tags: ["performance", "database"] },
    ]
  },
  {
    id: "devops",
    title: "DevOps, CI/CD & Cloud",
    icon: "🚀",
    color: "c3",
    terms: [
      { name: "CI/CD Pipeline", def: "Continuous Integration: auto build + test on every commit. Continuous Delivery/Deployment: auto ship to staging/prod. Stages: build → test → scan → package → deploy → verify.", tags: ["devops", "foundation"] },
      { name: "Docker", def: "Containerization. Dockerfile defines image. Container = isolated process with its own filesystem. Images are immutable layers. docker-compose for local multi-service orchestration.", tags: ["devops", "containers"] },
      { name: "Kubernetes (K8s)", def: "Container orchestration. Pods (smallest unit), Deployments (manages pod replicas), Services (stable networking), Ingress (external access), ConfigMap/Secrets. kubectl is the CLI.", tags: ["devops", "kubernetes"] },
      { name: "Helm Charts", def: "Kubernetes package manager. Templates with values.yaml for configuration. Makes K8s deployments reusable and versioned. Upgrade/rollback via `helm upgrade/rollback`.", tags: ["devops", "kubernetes"] },
      { name: "Infrastructure as Code (IaC)", def: "Manage infrastructure via code, not manual clicks. Terraform (provider-agnostic, declarative), Pulumi (code-first), AWS CDK. Version-controlled, reproducible environments.", tags: ["devops", "cloud"] },
      { name: "Blue-Green Deployment", def: "Two identical environments. Blue = current prod, Green = new version. Switch traffic to Green after testing. Instant rollback by switching back. Zero downtime.", tags: ["devops", "deployment"] },
      { name: "Canary Deployment", def: "Route small % of traffic to new version. Monitor metrics. Gradually increase if healthy. Rollback if error rates spike. Kubernetes + Istio support this natively.", tags: ["devops", "deployment"] },
      { name: "12-Factor Config", def: "Config (DB URLs, API keys) should come from environment, not code. `@Value` + environment variables or Spring Cloud Config Server. Never commit secrets to repo.", tags: ["devops", "cloud"] },
      { name: "Log Aggregation (ELK Stack)", def: "Elasticsearch (store/search), Logstash (ingest/transform), Kibana (visualize). Alternative: Grafana Loki (lighter). Structured JSON logging is preferred over plain text.", tags: ["devops", "observability"] },
      { name: "Service Health Checks", def: "Liveness: is app alive? (restart if failing). Readiness: is app ready to serve traffic? (remove from load balancer if failing). Kubernetes probes use Spring Actuator /health endpoint.", tags: ["devops", "kubernetes"] },
      { name: "Feature Flags", def: "Toggle features without deployment. Gradual rollout, A/B testing, kill switches. LaunchDarkly, Unleash, custom DB-backed flags. Decouple deploy from release.", tags: ["devops", "deployment"] },
    ]
  },
  {
    id: "observability",
    title: "Observability & Monitoring",
    icon: "📊",
    color: "c1",
    terms: [
      { name: "The Three Pillars of Observability", def: "Logs (what happened), Metrics (how system behaves over time), Traces (how a request flowed through services). All three needed for production debugging.", tags: ["observability", "foundation"] },
      { name: "Structured Logging", def: "JSON-formatted logs with consistent fields (timestamp, level, service, traceId, message). Enables log queries. Use SLF4J + Logback/Log4j2. MDC for correlation IDs.", tags: ["observability", "logging"] },
      { name: "Distributed Tracing", def: "Track a request's journey across services. TraceId propagated via headers. Spans represent operations within a trace. Tools: Jaeger, Zipkin, AWS X-Ray, OpenTelemetry.", tags: ["observability", "tracing"] },
      { name: "OpenTelemetry", def: "Vendor-neutral standard for traces, metrics, logs. Single instrumentation → export to any backend. Spring Boot 3+ has native support. The future of observability instrumentation.", tags: ["observability", "standard"] },
      { name: "Prometheus & Grafana", def: "Prometheus: pull-based metrics scraping, PromQL query language. Grafana: dashboards. Spring Actuator + Micrometer exposes Prometheus-compatible metrics at /actuator/prometheus.", tags: ["observability", "metrics"] },
      { name: "SLI / SLO / SLA", def: "SLI: metric measuring service level (latency p99, availability). SLO: target for SLI (99.9% uptime). SLA: contract with consequences. Error budgets derived from SLOs.", tags: ["observability", "reliability"] },
      { name: "Alerting & On-Call", def: "Alert on SLO breaches, not raw metrics. Avoid alert fatigue. PagerDuty, OpsGenie for on-call rotation. Runbooks document remediation steps. Alert on symptoms, not causes.", tags: ["observability", "ops"] },
      { name: "Correlation ID / Request ID", def: "Unique ID generated at entry point (Gateway), propagated via HTTP headers and log MDC through all services. Enables correlating logs across services for a single request.", tags: ["observability", "design"] },
    ]
  },
  {
    id: "design-patterns",
    title: "Design Patterns",
    icon: "🎨",
    color: "c2",
    terms: [
      { name: "Singleton Pattern", def: "Ensure one instance per JVM. Private constructor + static factory. Thread-safe via enum or double-checked locking. Spring beans are Singleton by default.", tags: ["patterns", "creational"] },
      { name: "Factory / Factory Method", def: "Delegate object creation to subclasses or a factory method. Decouples creation from usage. Used extensively in Spring (BeanFactory, SqlSessionFactory).", tags: ["patterns", "creational"] },
      { name: "Builder Pattern", def: "Construct complex objects step-by-step. Fluent API. @Builder (Lombok). Avoids telescoping constructors. Immutable objects with many optional fields.", tags: ["patterns", "creational"] },
      { name: "Strategy Pattern", def: "Define family of algorithms, encapsulate each, make interchangeable. Eliminates conditionals. Example: different payment processors, sorting algorithms, fee calculators.", tags: ["patterns", "behavioral"] },
      { name: "Observer Pattern", def: "Subject notifies observers of state changes. Loose coupling. Java: EventListener. Spring: ApplicationEvent + ApplicationEventPublisher. Foundation of event-driven patterns.", tags: ["patterns", "behavioral"] },
      { name: "Decorator Pattern", def: "Wrap objects to add behavior without modifying class. Composable. Java I/O streams are classic example. Spring Security filter chain.", tags: ["patterns", "structural"] },
      { name: "Proxy Pattern", def: "Surrogate that controls access to real object. Spring AOP uses JDK dynamic proxies or CGLIB. Used for lazy init, access control, logging, caching (@Cacheable).", tags: ["patterns", "structural"] },
      { name: "Template Method Pattern", def: "Define algorithm skeleton in base class, defer steps to subclasses. Spring's JdbcTemplate, RestTemplate use this. Separates invariant from variant behavior.", tags: ["patterns", "behavioral"] },
      { name: "Repository Pattern", def: "Abstracts data access behind an interface. Business logic doesn't know about DB. Spring Data JPA repositories implement this. Enables swapping storage without touching domain logic.", tags: ["patterns", "data"] },
      { name: "Command Pattern", def: "Encapsulate request as object. Enables queuing, logging, undo. Spring @Async + task queues. CQRS Command objects. Microservice command handlers.", tags: ["patterns", "behavioral"] },
    ]
  },
  {
    id: "data-structures",
    title: "Data Structures & Algorithms",
    icon: "🧮",
    color: "c3",
    terms: [
      { name: "Big O Notation", def: "Algorithm efficiency expressed as function of input size n. O(1) constant, O(log n) logarithmic, O(n) linear, O(n log n) linearithmic, O(n²) quadratic. Analyze worst-case typically.", tags: ["algorithms", "foundation"] },
      { name: "Arrays & ArrayLists", def: "Contiguous memory. O(1) random access, O(n) insert/delete at middle. ArrayList: dynamic resizing (amortized O(1) append). Cache-friendly due to locality.", tags: ["data-structures"] },
      { name: "LinkedList", def: "Nodes with pointers. O(1) insert/delete at known position. O(n) search. High memory overhead (pointers). Use when frequent insertion/deletion at ends outweighs search cost.", tags: ["data-structures"] },
      { name: "Stack & Queue", def: "Stack: LIFO. Queue: FIFO. Deque: both ends. Stack uses: call stack, DFS, expression parsing. Queue uses: BFS, task scheduling, producer-consumer.", tags: ["data-structures"] },
      { name: "HashMap / HashSet", def: "Average O(1) get/put/contains via hashing. Worst O(n) with collisions. Java 8: tree bins at threshold 8. HashSet backed by HashMap. Not ordered.", tags: ["data-structures"] },
      { name: "Trees", def: "BST: O(log n) balanced. Binary search, in-order gives sorted sequence. Red-Black Tree (TreeMap): self-balancing. Trie: prefix-based string lookup. Heap: priority queue.", tags: ["data-structures"] },
      { name: "Sorting Algorithms", def: "QuickSort: O(n log n) avg, O(n²) worst. MergeSort: O(n log n) stable. HeapSort: O(n log n), in-place. Java Arrays.sort() uses TimSort (hybrid merge/insertion) for objects.", tags: ["algorithms"] },
      { name: "Graph Algorithms", def: "BFS: shortest path (unweighted), level-order. DFS: cycle detection, topological sort. Dijkstra: weighted shortest path. Used in service dependency analysis, network routing.", tags: ["algorithms"] },
      { name: "Dynamic Programming", def: "Break problems into overlapping subproblems, store solutions (memoization/tabulation). Knapsack, LCS, coin change. Recognize: optimal substructure + overlapping subproblems.", tags: ["algorithms"] },
      { name: "Binary Search", def: "O(log n) search on sorted data. Divide and conquer. Variations: first/last occurrence, search in rotated array. Also applied to search space (not just arrays).", tags: ["algorithms"] },
      { name: "Sliding Window / Two Pointers", def: "Efficient array/string techniques. Sliding window: subarray problems (max sum, anagram). Two pointers: sorted arrays, palindromes. Often reduces O(n²) to O(n).", tags: ["algorithms"] },
    ]
  },
  {
    id: "testing",
    title: "Testing",
    icon: "🧪",
    color: "c1",
    terms: [
      { name: "Testing Pyramid", def: "Unit tests (fast, many) > Integration tests (slower, some) > E2E tests (slowest, few). More tests at bottom = faster feedback. Don't invert the pyramid.", tags: ["testing", "foundation"] },
      { name: "Unit Testing (JUnit 5)", def: "@Test, @BeforeEach, @AfterEach, @ParameterizedTest, @ExtendWith. Test behavior not implementation. Given-When-Then structure. Fast, isolated, no external dependencies.", tags: ["testing", "java"] },
      { name: "Mockito", def: "Mock dependencies in unit tests. `@Mock`, `@InjectMocks`, `@Spy`. `when().thenReturn()`, `verify()`. Use Mockito judiciously — heavy mocking often signals design issues.", tags: ["testing", "java"] },
      { name: "Integration Testing (@SpringBootTest)", def: "Loads full or partial Spring context. `@SpringBootTest`, `@DataJpaTest`, `@WebMvcTest`. Use TestContainers for real DB in CI. Slower but tests wiring.", tags: ["testing", "spring"] },
      { name: "TestContainers", def: "Spin up real Docker containers (Postgres, Kafka, Redis) in tests. Integration tests against real infrastructure. Disposable, reproducible. Java library with JUnit 5 integration.", tags: ["testing", "advanced"] },
      { name: "Contract Testing (Pact)", def: "Consumer defines expected API contract. Provider verifies it. Prevents breaking changes without full E2E suites. Critical for microservices teams moving independently.", tags: ["testing", "microservices"] },
      { name: "Test Coverage", def: "% of code executed during tests. JaCoCo for Java. Aim 80%+ for critical paths. 100% coverage ≠ no bugs. Focus on behavior coverage over line coverage.", tags: ["testing"] },
      { name: "TDD (Test-Driven Development)", def: "Red → Green → Refactor. Write failing test first, then minimal code to pass, then refactor. Drives better design, forces testability, built-in regression suite.", tags: ["testing", "methodology"] },
    ]
  },
  ,
  {
    id: "computer-architecture",
    title: "Computer Architecture",
    icon: "🖥️",
    color: "c2",
    terms: [
      { name: "Binary & Number Systems", def: "Computers operate in base-2 (binary). 0b1010 = 10 decimal = 0xA hex. Bit: single 0/1. Byte: 8 bits. Conversions: decimal→binary via repeated division by 2. Example: 13 = 8+4+1 = 0b1101.", tags: ["architecture", "foundation"] },
      { name: "Two's Complement", def: "How negative integers are represented in binary. Invert all bits then add 1. Example: -5 in 8-bit = ~00000101 + 1 = 11111010 + 1 = 11111011. This is why Java int range is -2^31 to 2^31-1.", tags: ["architecture", "foundation"] },
      { name: "Bitwise Operators", def: "AND (&), OR (|), XOR (^), NOT (~), left shift (<<), right shift (>>). Example: check if number is even: `n & 1 == 0`. Multiply by 2: `n << 1`. Fast because hardware-native. Used in flags, hashing, crypto.", tags: ["architecture", "programming"] },
      { name: "CPU Architecture (Von Neumann)", def: "CPU + Memory + I/O + Bus. Fetch instruction from memory → Decode → Execute → Writeback (FDEW cycle). ALU does arithmetic. Registers are on-chip ultra-fast storage. Program Counter tracks next instruction.", tags: ["architecture", "foundation"] },
      { name: "CPU Registers", def: "Tiny on-chip storage (nanoseconds). x86-64: RAX, RBX, RCX, RDX (general), RSP (stack pointer), RBP (base pointer), RIP (instruction pointer). JVM has its own virtual registers per method frame.", tags: ["architecture"] },
      { name: "Memory Hierarchy", def: "Registers (< 1ns) → L1 Cache (1-4ns, 32-64KB) → L2 Cache (4-12ns, 256KB-1MB) → L3 Cache (12-40ns, 4-32MB) → RAM (60-100ns, GBs) → SSD (100µs) → HDD (10ms). Each level: bigger but slower.", tags: ["architecture", "performance"] },
      { name: "CPU Cache (L1/L2/L3)", def: "Hardware-managed fast memory close to CPU. Cache line = 64 bytes. Cache hit: data found in cache. Cache miss: must fetch from RAM (costly). Spatial locality (nearby data) and temporal locality (recent data) improve hit rate.", tags: ["architecture", "performance"] },
      { name: "Cache Coherence", def: "In multi-core CPUs, each core has its own L1/L2 cache. If Core 1 updates a value, Core 2's cache must be invalidated. MESI protocol (Modified, Exclusive, Shared, Invalid) manages this. Source of JVM volatile semantics.", tags: ["architecture", "concurrency"] },
      { name: "Cache Line & False Sharing", def: "64-byte cache line is the unit of transfer. If two threads update different variables on the same cache line, they cause unnecessary cache invalidations — false sharing. Fix: pad structs or use @Contended annotation in Java.", tags: ["architecture", "performance"] },
      { name: "CPU Pipelining", def: "Instruction execution split into stages (Fetch, Decode, Execute, Writeback) running in parallel like an assembly line. 4-stage pipeline = 4 instructions in flight. Pipeline hazards (data, control, structural) stall it.", tags: ["architecture"] },
      { name: "Branch Prediction", def: "CPU speculatively executes code before knowing branch outcome. Modern CPUs ~95%+ accurate. Misprediction flushes pipeline (10-20 cycle penalty). Sorting data before branching can improve prediction (famous StackOverflow example).", tags: ["architecture", "performance"] },
      { name: "Out-of-Order Execution", def: "CPU reorders instructions internally to avoid stalls, executes independent instructions early. Transparent to programmer (single thread). Multi-threaded: memory ordering guarantees via CPU memory barriers / Java volatile.", tags: ["architecture", "concurrency"] },
      { name: "SIMD (Single Instruction Multiple Data)", def: "Execute same operation on multiple data items simultaneously. SSE, AVX instructions. JVM JIT auto-vectorizes eligible loops. Foundation of NumPy, video processing, ML inference speed. Example: sum 8 floats in one instruction.", tags: ["architecture", "performance"] },
      { name: "Stack vs Heap Memory", def: "Stack: LIFO, per-thread, holds method frames (local vars, return addresses), auto-reclaimed on return. Very fast. Heap: shared, GC-managed, holds Java objects. StackOverflowError = too deep recursion. OutOfMemoryError = heap exhausted.", tags: ["architecture", "java"] },
      { name: "Stack Frame", def: "Each method call pushes a frame: local variables, operand stack (in JVM), return address. Java Stack: `main → serviceMethod → repositoryMethod`. Deep recursion fills stack. Tail call optimization (not in Java JVM) reuses frames.", tags: ["architecture", "java"] },
      { name: "Virtual Memory & Paging", def: "OS abstraction giving each process its own address space. Physical RAM divided into 4KB pages. Page table maps virtual→physical. Page fault: access to page not in RAM — OS loads from disk. TLB caches recent translations.", tags: ["architecture", "os"] },
      { name: "Memory Alignment", def: "Data accessed at addresses that are multiples of its size. int at address divisible by 4. Misaligned access can cause performance penalty or hardware exception. JVM ensures alignment automatically.", tags: ["architecture"] },
      { name: "Endianness", def: "Byte order in multi-byte values. Big-endian: most significant byte first (network byte order). Little-endian: least significant byte first (x86 CPUs). Java: big-endian. Matters when parsing binary protocols (TCP headers, Kafka wire format).", tags: ["architecture", "networking"] },
      { name: "Instruction Set Architecture (ISA)", def: "Contract between hardware and software defining instructions the CPU understands. x86-64 (CISC, Intel/AMD), ARM (RISC, mobile/Apple Silicon), RISC-V (open-source). JVM bytecode is a virtual ISA.", tags: ["architecture"] },
      { name: "RISC vs CISC", def: "RISC (ARM): few simple instructions, load-store model, faster clock. CISC (x86): many complex instructions, memory operands allowed. Modern x86 CPUs internally decode CISC to RISC-like micro-ops.", tags: ["architecture"] },
      { name: "Interrupts & Exceptions", def: "Interrupts: async signal from hardware (keyboard press, timer) to CPU. CPU pauses, runs Interrupt Service Routine (ISR). Exceptions: sync events (divide by zero, page fault). Hardware mechanism that enables OS multitasking and I/O.", tags: ["architecture", "os"] },
      { name: "DMA (Direct Memory Access)", def: "Hardware mechanism allowing I/O devices to transfer data directly to/from RAM without CPU involvement. CPU sets up DMA controller, goes off to do other work, gets an interrupt when transfer completes. Enables high-throughput I/O (NIC, disk).", tags: ["architecture", "performance"] },
      { name: "CPU Cores & Hyper-Threading", def: "Multi-core: physically separate execution units. Hyper-Threading (Intel): 2 hardware threads per core sharing execution units, appears as 2 logical CPUs. Java thread pool sizing: typically based on available processors via `Runtime.getRuntime().availableProcessors()`.", tags: ["architecture", "concurrency"] },
    ]
  },
  {
    id: "operating-systems",
    title: "Operating Systems",
    icon: "⚙️",
    color: "c3",
    terms: [
      { name: "Process vs Thread", def: "Process: independent execution unit with own memory space (heap, stack, file descriptors). Thread: lightweight unit within a process, shares heap. Context switch between processes is expensive; between threads cheaper. Java threads map 1:1 to OS threads.", tags: ["os", "concurrency"] },
      { name: "Process States", def: "New → Ready → Running → Waiting → Terminated. Scheduler moves processes between Ready and Running. I/O blocks process → Waiting. OS kernel manages state transitions.", tags: ["os"] },
      { name: "Context Switching", def: "OS saves CPU state (registers, PC) of current thread, loads state of next thread. Costs: ~1-10µs. Too many threads → too many context switches → CPU wastes time switching rather than doing work. Why thread pools have limits.", tags: ["os", "performance"] },
      { name: "Scheduling Algorithms", def: "Round Robin: equal time slices, fair. Priority-based: higher priority runs first (starvation risk). CFS (Linux Completely Fair Scheduler): virtual runtime balancing. Java: OS-controlled; you set thread priority as hints, not guarantees.", tags: ["os"] },
      { name: "Deadlock", def: "Four conditions (Coffman): Mutual Exclusion, Hold and Wait, No Preemption, Circular Wait. Prevention: lock ordering (always acquire locks in same order). Detection: timeout + retry. Example: Thread A holds lock1, needs lock2; Thread B holds lock2, needs lock1.", tags: ["os", "concurrency"] },
      { name: "Mutex vs Semaphore", def: "Mutex: binary lock, owner-exclusive, must be released by acquirer. Semaphore: counter-based, controls access to N resources. Binary semaphore ≠ mutex (no ownership). Java: synchronized/ReentrantLock ≈ mutex. Semaphore class for N-slot control.", tags: ["os", "concurrency"] },
      { name: "Race Condition", def: "Outcome depends on timing of concurrent operations. Example: two threads both read `balance=100`, both add 50, both write 150 → final is 150 not 200. Fix: synchronization, atomic operations, immutability.", tags: ["os", "concurrency"] },
      { name: "Spinlock vs Blocking Lock", def: "Spinlock: thread busily loops checking until lock free. Fast for very short waits. Blocking: thread yields CPU if lock unavailable. Java synchronized = blocking (OS park). Spinlock wastes CPU; blocking wastes context switch time.", tags: ["os", "concurrency"] },
      { name: "Memory Management (Malloc/Free)", def: "C-style manual. OS allocates virtual memory pages via mmap/brk. malloc manages a free list within the heap segment. Java replaces this entirely with GC. Understanding it explains why off-heap (ByteBuffer.allocateDirect) is useful for DB/networking.", tags: ["os", "memory"] },
      { name: "Garbage Collection (GC)", def: "Automatic memory reclamation. Mark-and-sweep: trace live objects, free unreachable. Generational hypothesis: most objects die young. JVM Generations: Eden → Survivor → Old Gen. GC pauses stop the world briefly. G1GC, ZGC minimize pauses.", tags: ["os", "java", "performance"] },
      { name: "Virtual Memory & Swap", def: "OS extends RAM using disk (swap space). Processes see contiguous virtual address space. If RAM full, OS swaps cold pages to disk. JVM on swap = disaster (GC pauses become seconds). Always pin JVM heap in RAM for production services.", tags: ["os", "memory"] },
      { name: "System Calls (syscalls)", def: "Interface between user-space and kernel. Examples: read(), write(), socket(), fork(), mmap(), epoll_wait(). Every file/network/process operation goes through syscalls. Expensive (mode switch). Java NIO uses epoll for non-blocking I/O on Linux.", tags: ["os"] },
      { name: "File Descriptors", def: "Integer handle referencing open file/socket/pipe in kernel. Process has a table of FDs. Limit: ulimit -n (typical 1024 or 65535). Leak = running out of FDs, causing I/O failures. Always close resources (try-with-resources in Java).", tags: ["os"] },
      { name: "I/O Models: Blocking vs Non-Blocking", def: "Blocking: thread waits for I/O to complete (simple but wastes threads). Non-blocking: thread checks if I/O ready, does other work if not. Async I/O: OS notifies when complete. Java NIO (Selector), Netty, WebFlux use non-blocking I/O.", tags: ["os", "performance"] },
      { name: "epoll / kqueue / IOCP", def: "OS-level event notification mechanisms. epoll (Linux): register many FDs, get notified when ready. kqueue (BSD/macOS). IOCP (Windows). Foundation of event loops in Node.js, Netty, Nginx. Enable handling 10K+ connections with few threads.", tags: ["os", "networking"] },
      { name: "Copy-on-Write (CoW)", def: "Optimization: parent and child process share same memory pages initially. Only when a write occurs does OS copy the page. Used by `fork()`. Redis background save uses fork + CoW. Also: Java CopyOnWriteArrayList for read-heavy concurrent collections.", tags: ["os", "performance"] },
      { name: "Memory-Mapped Files (mmap)", def: "Map file contents into virtual address space. Read/write as if array in memory; OS handles paging to/from disk. Used by Kafka (log segments), databases. Very efficient for sequential scans of large files.", tags: ["os", "performance"] },
      { name: "Signals (UNIX)", def: "Async notifications to processes: SIGTERM (graceful shutdown), SIGKILL (immediate kill), SIGHUP (reload config), SIGSEGV (segfault). Spring Boot listens to SIGTERM for graceful shutdown. Docker stop sends SIGTERM then SIGKILL after timeout.", tags: ["os"] },
      { name: "Inter-Process Communication (IPC)", def: "Pipes (|), named pipes (FIFO), message queues, shared memory, semaphores, sockets. Sockets work across machines too. Java: rarely manual IPC — prefer messaging systems (Kafka) or HTTP for inter-service communication.", tags: ["os"] },
      { name: "Process Isolation & Containers", def: "Linux namespaces (pid, network, mount, user) isolate process views. cgroups limit CPU/memory. Docker uses namespaces + cgroups to create lightweight 'containers' — processes that think they're alone on the machine.", tags: ["os", "devops"] },
    ]
  },
  {
    id: "networking",
    title: "Networking Fundamentals",
    icon: "🌐",
    color: "c1",
    terms: [
      { name: "OSI Model (7 Layers)", def: "Physical → Data Link → Network → Transport → Session → Presentation → Application. Mnemonic: Please Do Not Throw Sausage Pizza Away. TCP operates at layer 4. HTTP at layer 7. IP at layer 3. Each layer adds a header.", tags: ["networking", "foundation"] },
      { name: "TCP/IP Model", def: "Simplified 4-layer model: Network Access (Ethernet) → Internet (IP) → Transport (TCP/UDP) → Application (HTTP, DNS, SMTP). The real-world model used by the internet.", tags: ["networking", "foundation"] },
      { name: "IP Addressing (IPv4/IPv6)", def: "IPv4: 32-bit, dotted decimal (192.168.1.1). ~4.3 billion addresses, exhausted. IPv6: 128-bit, hex (2001:db8::1). Private ranges: 10.x.x.x, 172.16.x.x, 192.168.x.x. CIDR: 192.168.1.0/24 = 256 addresses.", tags: ["networking"] },
      { name: "TCP (Transmission Control Protocol)", def: "Reliable, ordered, connection-oriented. 3-way handshake (SYN→SYN-ACK→ACK). Flow control (sliding window). Congestion control (slow start, AIMD). Error detection via checksum + retransmit. Used for HTTP, JDBC, most backend protocols.", tags: ["networking", "foundation"] },
      { name: "TCP 3-Way Handshake", def: "Client SYN → Server SYN-ACK → Client ACK. Establishes sequence numbers. Takes 1 RTT before data flows. TCP connection teardown: 4-way FIN exchange. Expensive for short-lived requests → HTTP keep-alive, connection pooling.", tags: ["networking"] },
      { name: "UDP (User Datagram Protocol)", def: "Connectionless, no guaranteed delivery or ordering. Low overhead. Used where speed > reliability: DNS (one packet), video streaming, gaming, QUIC. Application handles retransmit if needed. No 3-way handshake overhead.", tags: ["networking"] },
      { name: "HTTP/1.1 vs HTTP/2 vs HTTP/3", def: "HTTP/1.1: text-based, one request per connection (keep-alive helps). HTTP/2: binary, multiplexed streams over one TCP connection, header compression. HTTP/3: runs over QUIC (UDP), avoids TCP head-of-line blocking. gRPC uses HTTP/2.", tags: ["networking", "api"] },
      { name: "DNS (Domain Name System)", def: "Translates hostnames to IP addresses. Recursive resolver → Root server → TLD server → Authoritative server. TTL controls caching. A record (IPv4), AAAA (IPv6), CNAME (alias), MX (mail), SRV (service discovery). Java: InetAddress.getByName().", tags: ["networking"] },
      { name: "Ports & Sockets", def: "Port: 16-bit number (0-65535) identifying service on a host. Well-known: HTTP=80, HTTPS=443, MySQL=3306, Postgres=5432, Redis=6379, Kafka=9092. Socket = IP:Port pair. Java ServerSocket listens; Socket connects.", tags: ["networking"] },
      { name: "TLS/SSL Handshake", def: "Client Hello (supported ciphers) → Server Hello + Certificate → Client verifies cert, sends key exchange → Both derive session keys → Encrypted data flows. TLS 1.3 reduces to 1-RTT. Certificates use asymmetric crypto; session uses symmetric.", tags: ["networking", "security"] },
      { name: "HTTP Headers", def: "Request: Host, Authorization, Content-Type, Accept, Cookie, X-Request-ID. Response: Content-Type, Cache-Control, Set-Cookie, Location (redirect), X-RateLimit-*. Headers are case-insensitive in HTTP. Spring: @RequestHeader extracts them.", tags: ["networking", "api"] },
      { name: "TCP Connection Pooling", def: "Creating TCP connections is expensive (handshake + TLS). HikariCP (DB), HttpClient, RestTemplate, WebClient all maintain pools of reusable connections. Key settings: max-connections, keep-alive, socket timeout, connect timeout.", tags: ["networking", "performance"] },
      { name: "Load Balancer (L4 vs L7)", def: "L4 (TCP): routes by IP:port, fast, no content awareness. L7 (HTTP): routes by URL path, headers, cookies — enables sticky sessions, path-based routing, SSL termination. AWS ALB=L7, NLB=L4.", tags: ["networking", "scalability"] },
      { name: "NAT (Network Address Translation)", def: "Maps private IPs to public IPs. Enables many devices to share one public IP. PAT (port address translation) adds port numbers. AWS VPC, Docker bridge network use NAT. Complicates direct server-to-server comms (why service discovery is needed).", tags: ["networking"] },
      { name: "Firewall & Security Groups", def: "Controls inbound/outbound traffic by IP/port/protocol rules. AWS Security Groups = stateful firewall. NACLs = stateless. Principle: deny all, allow only what's needed. Backend services should never be directly internet-accessible.", tags: ["networking", "security"] },
      { name: "Latency vs Bandwidth vs Throughput", def: "Latency: time for one packet to travel (RTT). Bandwidth: max data capacity of link. Throughput: actual data transferred per second. High bandwidth ≠ low latency. Optimize for both: parallel requests exploit bandwidth; caching and co-location reduce latency.", tags: ["networking", "performance"] },
      { name: "Wireshark & tcpdump", def: "Network packet capture tools. tcpdump: CLI, `tcpdump -i eth0 port 8080`. Wireshark: GUI with protocol dissection. Invaluable for debugging TLS, TCP retransmits, latency spikes. Every backend engineer should know the basics.", tags: ["networking"] },
      { name: "WebSockets", def: "Full-duplex persistent connection over TCP, upgraded from HTTP via handshake (101 Switching Protocols). Enables real-time bi-directional communication: chat, live dashboards, stock tickers. Spring: @ServerEndpoint or spring-websocket.", tags: ["networking", "api"] },
      { name: "Reverse Proxy", def: "Sits in front of backend servers, forwards client requests. Provides SSL termination, load balancing, caching, DDoS protection. NGINX, HAProxy, Envoy are common. Contrasts with forward proxy (client-side).", tags: ["networking", "architecture"] },
      { name: "Packet Loss & Retransmission", def: "TCP detects loss via timeout or 3 duplicate ACKs → retransmits. Loss → congestion window shrinks. On AWS, inter-AZ drops are ~0%, but WAN links see 0.1-1% loss which multiplies latency. Monitor via /proc/net/snmp or Datadog network metrics.", tags: ["networking", "performance"] },
    ]
  },
  {
    id: "programming-fundamentals",
    title: "Programming Paradigms & Fundamentals",
    icon: "💡",
    color: "c2",
    terms: [
      { name: "Imperative vs Declarative", def: "Imperative: how to do it (loops, steps). Declarative: what you want (SQL, HTML, Stream API). Example: imperative = `for loop filtering list`; declarative = `list.stream().filter(x -> x.age > 18).collect()`. Declarative is usually more readable.", tags: ["programming", "foundation"] },
      { name: "Procedural Programming", def: "Code organized as procedures/functions called in sequence. C is procedural. Evolved into OOP for better modeling complex domains. Still relevant for scripting, system programming, performance-critical code.", tags: ["programming"] },
      { name: "Functional Programming (FP)", def: "Functions as first-class citizens, no side effects (pure functions), immutability, function composition. Java 8+ supports FP with lambdas, streams, Optional. Pure functions are trivially testable and parallelizable.", tags: ["programming", "foundation"] },
      { name: "Pure Functions", def: "Same input always gives same output. No side effects (no I/O, no state mutation). Example: `int add(int a, int b) { return a + b; }`. Pure functions are thread-safe by definition and easy to test.", tags: ["programming", "functional"] },
      { name: "Immutability", def: "Once created, object state cannot change. String in Java is immutable — enables string pool. Benefits: thread safety (no synchronization needed), safe sharing, easier reasoning. Tradeoff: allocation overhead. Record classes in Java 16+ enforce immutability.", tags: ["programming", "concurrency"] },
      { name: "First-Class Functions", def: "Functions treated as values: passed as arguments, returned from functions, assigned to variables. Java: lambda expressions and method references are first-class. Enables callbacks, strategy pattern, functional pipelines.", tags: ["programming", "functional"] },
      { name: "Higher-Order Functions", def: "Functions that take or return other functions. Java examples: `list.sort(Comparator.comparingInt(String::length))`, `stream.map(String::toUpperCase)`. Enable powerful abstractions without subclassing.", tags: ["programming", "functional"] },
      { name: "Closures", def: "Function that captures variables from its enclosing scope. Java lambdas capture effectively-final variables. Example: `int threshold = 10; list.stream().filter(n -> n > threshold)` — lambda closes over `threshold`.", tags: ["programming", "functional"] },
      { name: "Recursion & Base Cases", def: "Function calling itself with smaller subproblem until base case. Example: factorial(n) = n * factorial(n-1), base: factorial(0) = 1. Stack depth risk. Tail recursion (JVM doesn't optimize), iterative often safer. Use for tree traversal, divide-and-conquer.", tags: ["programming", "algorithms"] },
      { name: "Memoization", def: "Cache results of expensive pure function calls. Same input → return cached result. Example: fibonacci with HashMap cache reduces O(2^n) to O(n). Java: compute-if-absent pattern with ConcurrentHashMap. Foundation of Dynamic Programming.", tags: ["programming", "performance"] },
      { name: "Currying & Partial Application", def: "Currying: transform f(a,b) into f(a)(b). Partial Application: fix some arguments, return function for rest. Java: `Function<Integer, Function<Integer, Integer>> add = a -> b -> a + b;`. Enables reusable specialized functions.", tags: ["programming", "functional"] },
      { name: "Type Systems", def: "Static typing (Java, Kotlin): types checked at compile time, catches errors early. Dynamic typing (Python, JS): types resolved at runtime, flexible. Strong typing: implicit coercions disallowed. Java is static + strong.", tags: ["programming", "foundation"] },
      { name: "Pass by Value vs Pass by Reference", def: "Java: ALWAYS pass by value. Primitives: copy of value. Objects: copy of reference (pointer). So `void modify(List<String> list)` CAN add to the same list, but `void modify(String s)` CANNOT change caller's reference. Common interview trap.", tags: ["programming", "java"] },
      { name: "Null — The Billion Dollar Mistake", def: "Tony Hoare invented null references and called it his 'billion dollar mistake'. NullPointerException is Java's most common runtime error. Modern solution: Optional<T>, non-null annotations (@NonNull), Kotlin's null-safety, fail-fast validation at boundaries.", tags: ["programming", "java"] },
      { name: "Tail Call Optimization (TCO)", def: "Compiler optimization transforming tail-recursive calls into a loop, avoiding stack growth. Scala supports TCO with @tailrec annotation. JVM does NOT support general TCO (Project Loom doesn't add it). Use trampoline pattern or explicit iteration for deep recursion in Java.", tags: ["programming", "compilers"] },
      { name: "Variable Scope & Lifetime", def: "Scope: where variable is visible (block, method, class, package). Lifetime: how long it lives. Local vars live on stack (die when method returns). Instance vars live on heap (die with object). Static vars live in metaspace (entire JVM lifetime).", tags: ["programming", "java"] },
      { name: "Short-Circuit Evaluation", def: "In `A && B`, if A is false, B is not evaluated. In `A || B`, if A is true, B is not evaluated. Java uses short-circuit for && and ||. Use this: `if (list != null && list.contains(x))` — safe null check + access. Bitwise `&` and `|` don't short-circuit.", tags: ["programming"] },
      { name: "Operator Precedence", def: "Controls evaluation order without parentheses. Java precedence (high to low): postfix (a++) → unary → multiplicative → additive → shift → relational → equality → bitwise AND → XOR → OR → logical AND → OR → ternary → assignment. When in doubt, use parentheses.", tags: ["programming"] },
      { name: "Covariance & Contravariance", def: "Covariance: `List<Dog>` is subtype of `List<? extends Animal>` — can read animals. Contravariance: `List<? super Dog>` — can write dogs. Java generics are invariant by default. PECS: Producer Extends, Consumer Super. Critical for correct generic API design.", tags: ["programming", "java"] },
      { name: "Autoboxing & Unboxing", def: "Automatic conversion between primitives and wrapper objects. int ↔ Integer, long ↔ Long. Silent performance cost: creates heap objects. Can cause NullPointerException: `Integer i = null; int x = i;` — NPE on unboxing. Avoid in tight loops.", tags: ["programming", "java"] },
      { name: "String Interning & String Pool", def: "JVM maintains a string pool in heap/metaspace. String literals are interned automatically. `\"hello\" == \"hello\"` is true (same pool object). `new String(\"hello\") == \"hello\"` is false. Always use `.equals()` for string comparison.", tags: ["programming", "java"] },
    ]
  },
  {
    id: "compilers-runtime",
    title: "Compilers, JVM & Runtime",
    icon: "🔧",
    color: "c3",
    terms: [
      { name: "Compilation Pipeline", def: "Source code → Lexer (tokens) → Parser (AST) → Semantic Analysis (type checking) → Optimization (IR transforms) → Code Generation (machine code or bytecode). javac produces .class files (bytecode), JVM executes them.", tags: ["compilers", "foundation"] },
      { name: "Lexing & Tokenization", def: "First compiler phase: scan source text, produce tokens (keywords, identifiers, literals, operators). Example: `int x = 5;` → [INT, IDENTIFIER(x), ASSIGN, INT_LITERAL(5), SEMICOLON]. Regular expressions / finite automata power lexers.", tags: ["compilers"] },
      { name: "Abstract Syntax Tree (AST)", def: "Tree representation of source code structure. Nodes: MethodDecl, IfStmt, BinaryOp, Literal. Used by compilers, static analysis tools (SpotBugs, SonarQube), code formatters. Java's annotation processors operate on ASTs.", tags: ["compilers"] },
      { name: "JVM Bytecode", def: "Platform-independent instruction set javac compiles to. Stored in .class files. JVM interprets or JIT-compiles to native code. `javap -c MyClass.class` disassembles bytecode. Bytecode manipulation: ASM, ByteBuddy (used by Mockito, Spring AOP, Hibernate).", tags: ["compilers", "java"] },
      { name: "JIT Compilation (Just-In-Time)", def: "JVM interprets bytecode initially. HotSpot detects hot methods (called often) and JIT-compiles them to native machine code. C1 compiler: fast, less optimized. C2: slow, heavily optimized. JVM warms up over time — don't benchmark cold JVMs.", tags: ["compilers", "java", "performance"] },
      { name: "GraalVM & Native Image", def: "GraalVM JIT is more aggressively optimizing than HotSpot C2. Native Image: AOT-compile Java to standalone binary. No JVM needed, instant startup, low memory. Trade-off: no dynamic class loading. Spring Native supports this for microservices.", tags: ["compilers", "java"] },
      { name: "Classloading", def: "JVM loads .class files on first use. ClassLoader hierarchy: Bootstrap → Extension → Application → Custom. Delegation model: child asks parent first. Hot reload: load new ClassLoader with updated classes. Source of ClassNotFoundException, NoClassDefFoundError.", tags: ["compilers", "java"] },
      { name: "Inlining Optimization", def: "JIT replaces method call with method body at call site, eliminating call overhead. Enables further optimizations (dead code elimination, constant folding). Why small, focused methods don't hurt performance in Java — JIT inlines them away.", tags: ["compilers", "performance"] },
      { name: "Escape Analysis", def: "JIT determines if an object is accessible outside its method. If not (doesn't 'escape'), JIT may allocate it on stack instead of heap — avoids GC pressure. Enables scalar replacement (object fields become local variables). Enabled by default in HotSpot.", tags: ["compilers", "performance"] },
      { name: "Dead Code Elimination", def: "Compiler removes code that can never be reached or whose result is never used. Example: `if (false) { ... }` removed. JIT does this at runtime after profiling. Affects benchmarking: JMH prevents JIT from eliminating benchmark computations.", tags: ["compilers", "performance"] },
      { name: "Constant Folding & Propagation", def: "Compiler evaluates constant expressions at compile time. `int x = 2 * 3;` → `int x = 6;`. Constant propagation: replace variable with its known constant value. Makes code written for clarity run as fast as hand-optimized code.", tags: ["compilers", "performance"] },
