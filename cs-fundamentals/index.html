      { name: "PR / Code Review Workflow", def: "1. Create feature branch from main. 2. Small commits (one logical change each). 3. Push and open PR with description + ticket link. 4. Self-review diff before requesting reviews. 5. Respond to comments. 6. Squash-merge to keep main history clean. 7. Delete feature branch after merge. PRs < 400 lines get better reviews.", tags: ["git", "cheatsheet", "practices"] },
    ]
  },

  // ─── INTERVIEW PATTERNS & FRAMEWORKS ─────────────────────────────────
  {
    id: "interview-patterns",
    title: "Interview Patterns & Frameworks",
    icon: "🎯",
    color: "c1",
    terms: [
      { name: "STAR Method for Behavioural", def: "Situation: set the scene. Task: your responsibility. Action: what YOU specifically did (use I not we). Result: measurable outcome. Example: S: legacy COBOL system causing 3hr batch delays. T: I was asked to migrate critical settlement logic. A: I designed Kafka-based event pipeline, rewrote COBOL to Java. R: processing time dropped to 12 minutes, saved 4 FTEs.", tags: ["interview", "behavioural"] },
      { name: "System Design Interview Framework", def: "1. Clarify requirements (5 min): functional, non-functional, constraints. 2. Capacity estimation (3 min): RPS, storage, bandwidth. 3. High-level design (10 min): boxes and arrows. 4. Deep dive (15 min): interview picks 1-2 components. 5. Bottlenecks & tradeoffs (5 min). Ask: 'Should I focus on X?' Show structured thinking.", tags: ["interview", "system-design"] },
      { name: "Java Concurrency Interview Questions", def: "Q: Difference between synchronized and ReentrantLock? A: synchronized is simpler, ReentrantLock adds tryLock, fairness, multiple conditions. Q: What is volatile? A: visibility + ordering, not atomicity. Q: How to prevent deadlock? A: consistent lock ordering, lock timeout, avoid nested locks. Q: What is happens-before? A: JMM guarantee of visibility.", tags: ["interview", "java", "concurrency"] },
      { name: "Spring Interview Questions", def: "Q: How does @Transactional work? A: AOP proxy wraps method, manages connection. Internal calls bypass. Q: Singleton vs Prototype scope? A: Singleton: one per container (careful with state). Prototype: new per injection. Q: How does Spring Security filter chain work? A: series of filters, each can short-circuit. Q: What is @ConditionalOnMissingBean?", tags: ["interview", "spring"] },
      { name: "Database Interview Questions", def: "Q: When to use NoSQL vs SQL? A: SQL: ACID, complex queries, relations. NoSQL: scale, flexible schema, specific access patterns. Q: What is an N+1 problem? A: 1 query + N queries for each result. Q: Explain MVCC. A: Multiple Version Concurrency Control — readers never block writers, snapshot isolation. Q: When to denormalise? A: Read-heavy, acceptable staleness.", tags: ["interview", "database"] },
      { name: "LeetCode Patterns (Backend-relevant)", def: "Two Pointers: sorted array problems. Sliding Window: subarray/substring. HashMap for O(1) lookup (Two Sum, Group Anagrams). BFS/DFS for graph/tree. DP for optimization (memoize results). Heap for top-K. Binary search on answer space. Master these 7 patterns → solve 80% of medium problems.", tags: ["interview", "algorithms"] },
      { name: "Time Complexity Cheat Sheet", def: "ArrayList: get O(1), add O(1) amortised, remove O(n). HashMap: get/put O(1) avg. TreeMap: O(log n). LinkedList: add/remove O(1) at known pos, search O(n). PriorityQueue: offer/poll O(log n). Arrays.sort: O(n log n). HashSet.contains: O(1). String.substring: O(n) Java 7+. StringBuilder.append: O(1) amortised.", tags: ["interview", "algorithms"] },
      { name: "Microservices Interview Questions", def: "Q: How to handle distributed transactions? A: Saga pattern (choreography or orchestration) with compensating transactions. Q: What is service mesh? A: Infrastructure layer (Istio/Linkerd) handling mTLS, observability, retries via sidecar proxies. Q: How to ensure idempotency? A: Idempotency key + DB check before processing. Q: Circuit breaker states? A: Closed, Open, Half-Open.", tags: ["interview", "microservices"] },
      { name: "BFSI / Banking Domain Specifics", def: "Key terms: settlement, reconciliation, clearing, nostro/vostro accounts, ledger, double-entry bookkeeping, T+1/T+2 settlement. Compliance: PCI-DSS (card data), SOX (audit trails), GDPR (data privacy). Architecture: event-sourcing for audit trail, strong consistency for money movement, idempotency everywhere, immutable audit log.", tags: ["interview", "fintech", "domain"] },
      { name: "Salary Negotiation Framework", def: "Research: Glassdoor, Levels.fyi for role at target company. Anchor high (20-30% above target). Never give first number — 'What's the budgeted range?' Compete offers: 'I have an offer from X, can you match?'. Negotiate total comp (base + bonus + equity + notice buyout). GCC roles: typically higher base, less equity than product startups.", tags: ["interview", "career"] },
      { name: "What to Ask the Interviewer", def: "Tech: 'What does a typical on-call incident look like?' / 'How do you handle DB migrations with zero downtime?' Culture: 'How are technical decisions made?' / 'What's the biggest technical debt you're dealing with?' Growth: 'What does senior/staff career path look like here?' These reveal more about culture than any answer they give.", tags: ["interview", "career"] },
    ]
  },
];

// --- Render ---
const main = document.getElementById('main');
const toc = document.getElementById('toc');
const filterBtns = document.getElementById('filter-btns');
const searchInput = document.getElementById('search');

let activeFilter = 'all';

// Build filter buttons
const allTags = [...new Set(CATEGORIES.flatMap(c => c.terms.flatMap(t => t.tags)))].sort();
// Just show category-level filters for simplicity
const catFilters = ['all', 'java', 'spring', 'database', 'api', 'kafka', 'security', 'performance', 'devops', 'testing', 'patterns', 'architecture', 'os', 'networking', 'algorithms', 'compilers', 'math', 'caching', 'concurrency', 'cookies', 'docker', 'kubernetes', 'cheatsheet', 'system-design', 'ddia', 'distributed', 'production', 'dev-guide', 'sql', 'git', 'interview', 'fintech'];
catFilters.forEach(tag => {
  if (tag === 'all') return; // already added
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.dataset.filter = tag;
  btn.textContent = tag;
  filterBtns.appendChild(btn);
});

filterBtns.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

searchInput.addEventListener('input', render);

// TOC
const tocTitle = document.createElement('div');
tocTitle.className = 'toc-title';
tocTitle.textContent = 'Sections';
toc.appendChild(tocTitle);

CATEGORIES.forEach(cat => {
  const a = document.createElement('a');
  a.className = 'toc-item';
  a.href = `#${cat.id}`;
  a.innerHTML = `<span class="toc-dot"></span>${cat.title}`;
  a.addEventListener('click', (e) => {
    e.preventDefault();
    document.getElementById(cat.id)?.scrollIntoView({ behavior: 'smooth' });
    toc.querySelectorAll('.toc-item').forEach(i => i.classList.remove('active'));
    a.classList.add('active');
  });
  toc.appendChild(a);
});

function render() {
  const query = searchInput.value.toLowerCase().trim();
  main.innerHTML = '';
  let totalVisible = 0;

  CATEGORIES.forEach(cat => {
    const filtered = cat.terms.filter(term => {
      const matchesFilter = activeFilter === 'all' || term.tags.includes(activeFilter);
      const matchesSearch = !query ||
        term.name.toLowerCase().includes(query) ||
        term.def.toLowerCase().includes(query) ||
        term.tags.some(t => t.includes(query));
      return matchesFilter && matchesSearch;
    });

    if (filtered.length === 0) return;
    totalVisible += filtered.length;

    const section = document.createElement('section');
    section.className = 'category';
    section.id = cat.id;

    section.innerHTML = `
      <div class="category-header">
        <div class="category-icon" style="background:${cat.color === 'c1' ? 'rgba(0,255,136,0.1)' : cat.color === 'c2' ? 'rgba(255,107,53,0.1)' : 'rgba(124,106,255,0.1)'}">${cat.icon}</div>
        <span class="category-title">${cat.title}</span>
        <span class="category-count">${filtered.length} terms</span>
      </div>
      <div class="terms-grid" id="grid-${cat.id}"></div>
    `;

    main.appendChild(section);
    const grid = document.getElementById(`grid-${cat.id}`);

    filtered.forEach((term, i) => {
      const card = document.createElement('div');
      card.className = `term-card ${cat.color}`;
      card.style.animationDelay = `${i * 30}ms`;
      card.innerHTML = `
        <div class="term-name">${highlight(term.name, query)}</div>
        <div class="term-def">${highlight(term.def, query)}</div>
        <div class="term-tags">${term.tags.map(t => `<span class="term-tag">${t}</span>`).join('')}</div>
      `;
      grid.appendChild(card);
    });
  });

  if (totalVisible === 0) {
    main.innerHTML = `<div class="no-results">// no results for "${query}"<br><br>Try: java, spring, kafka, api, security...</div>`;
  }

  document.getElementById('visible-count').textContent = totalVisible;
}

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark style="background:rgba(0,255,136,0.25);color:inherit;border-radius:2px;">$1</mark>');
}

// Stats
const totalTerms = CATEGORIES.reduce((a, c) => a + c.terms.length, 0);
document.getElementById('total-count').textContent = totalTerms;
document.getElementById('cat-count').textContent = CATEGORIES.length;

render();
</script>
</body>
