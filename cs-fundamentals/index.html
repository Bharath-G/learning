      { name: "Symbol Table", def: "Compiler data structure mapping identifiers to their types, scopes, memory locations. Built during parsing/semantic analysis. Enables type checking and name resolution. Foundation of IDE features (autocomplete, go-to-definition).", tags: ["compilers"] },
      { name: "Interpreter vs Compiler", def: "Interpreter: executes source/bytecode directly, line by line. Portable but slow. Compiler: translates entire program to native code before execution. Fast but requires compilation step. JVM uses both: bytecode interpreter + JIT compiler.", tags: ["compilers", "foundation"] },
      { name: "Garbage Collection Algorithms", def: "Mark-and-sweep: trace from roots (GC roots), mark live, sweep unreachable. Copying: move live objects to new space, old space free. Mark-compact: mark + compact live objects. Generational: combine approaches per generation. ZGC: concurrent, <1ms pauses.", tags: ["compilers", "java", "performance"] },
      { name: "GC Roots", def: "Starting points for garbage collection tracing: local variables in active stack frames, static fields, JNI references. Objects reachable from any GC root are considered live. Circular references between unreachable objects are still collected (unlike reference counting).", tags: ["compilers", "java"] },
      { name: "Memory Barriers", def: "Instructions preventing CPU/compiler from reordering memory operations across the barrier. `volatile` in Java inserts barriers. Ensures visibility guarantees. `StoreStore`, `LoadLoad`, `StoreLoad`, `LoadStore` barriers. Without them, optimizations break multi-threaded correctness.", tags: ["compilers", "concurrency"] },
      { name: "Happens-Before Relationship", def: "Java Memory Model guarantee: if action A happens-before action B, A's effects are visible to B. Established by: `synchronized`, `volatile` write→read, `Thread.start()`, `Thread.join()`, `Future.get()`. Without happens-before, data races are undefined behavior.", tags: ["compilers", "java", "concurrency"] },
      { name: "Annotation Processing (APT)", def: "javac plugin that runs during compilation, reads annotations, generates code. Examples: Lombok (@Data generates getters/setters), MapStruct (generates mapper implementations), Spring's @ConfigurationProperties binding. Cleaner than runtime reflection.", tags: ["compilers", "java"] },
    ]
  },
  {
    id: "math-logic",
    title: "Math, Logic & Discrete Structures",
    icon: "∑",
    color: "c1",
    terms: [
      { name: "Boolean Algebra", def: "AND (∧), OR (∨), NOT (¬), XOR (⊕). De Morgan's laws: NOT(A AND B) = (NOT A) OR (NOT B). Foundation of circuit design, conditional logic, query optimization. Truth tables enumerate all combinations. Used in SQL WHERE clause optimization.", tags: ["math", "foundation"] },
      { name: "Set Theory", def: "Collections of distinct elements. Union (∪), Intersection (∩), Difference (\\), Complement. SQL JOINs model set operations. Bloom filters use set membership. Database theory (relational algebra) built on set theory.", tags: ["math", "database"] },
      { name: "Modular Arithmetic", def: "`a mod n`: remainder when a divided by n. 17 mod 5 = 2. Used in: hash table indexing (`hashCode % capacity`), cyclic buffers, clock arithmetic, cryptography (RSA), consistent hashing (Kafka partition: `key.hashCode() % numPartitions`).", tags: ["math"] },
      { name: "Logarithms", def: "log_b(x) = y means b^y = x. log_2(1024) = 10. B-tree of height h has b^h nodes. Binary search in log_2(n) steps. Understanding logs is essential for analyzing O(log n) algorithms and interpreting performance charts.", tags: ["math", "algorithms"] },
      { name: "Probability & Expected Value", def: "P(event): 0 to 1. Expected value E[X] = Σ x·P(x). Used in: load balancer distribution, cache hit rates, circuit breaker failure thresholds, probabilistic data structures (Bloom filter FP rate), chaos engineering blast radius.", tags: ["math"] },
      { name: "Hashing (Mathematical)", def: "Hash function: maps arbitrary input → fixed-size digest. Properties: deterministic, uniform distribution, avalanche effect. Cryptographic (SHA-256): collision-resistant, irreversible. Non-cryptographic (MurmurHash, xxHash): fast for hash tables, Kafka partitioning.", tags: ["math", "security"] },
      { name: "XOR Properties", def: "a XOR a = 0. a XOR 0 = a. XOR is commutative, associative. Applications: find single duplicate in array, swap without temp variable (`a^=b; b^=a; a^=b`), parity bits, simple checksums, Kafka partition assignment.", tags: ["math", "algorithms"] },
      { name: "Graph Theory", def: "G = (V, E): Vertices and Edges. Directed vs undirected. Weighted vs unweighted. Cycle detection, connectivity, shortest path. Applications: service dependency graphs, social networks, route planning, topological sort of build dependencies.", tags: ["math", "algorithms"] },
      { name: "Topological Sort", def: "Linear ordering of DAG (directed acyclic graph) nodes where each node comes before its dependencies. Algorithm: DFS-based or Kahn's (BFS with in-degree tracking). Use: build systems (Maven), task scheduling, database foreign key constraint ordering.", tags: ["math", "algorithms"] },
      { name: "Asymptotic Analysis", def: "Big-O (worst case), Omega (best case), Theta (tight bound). O(1) < O(log n) < O(n) < O(n log n) < O(n²) < O(2^n). Focus on dominant term; drop constants. O(n) + O(n²) = O(n²). Essential for algorithm comparison.", tags: ["math", "algorithms"] },
      { name: "Amortized Analysis", def: "Average cost per operation over a sequence of operations, even if some are expensive. ArrayList resize: doubling is O(n) when it happens but amortized O(1) per append. Splay trees, dynamic arrays all use amortized analysis.", tags: ["math", "algorithms"] },
      { name: "Pigeonhole Principle", def: "If n+1 items in n containers, at least one has 2+ items. Application: if hash table has n buckets and n+1 keys, guaranteed collision. Proves limits of any hash function. Also used in distributed systems reasoning about load distribution.", tags: ["math"] },
      { name: "Bloom Filter", def: "Probabilistic data structure answering 'is X in set?' with no false negatives but possible false positives. Uses k hash functions + bit array. Space-efficient. Used by: Cassandra (avoid disk reads for missing keys), Redis BITFIELD, CDNs. False positive rate tunable by array size.", tags: ["math", "data-structures"] },
      { name: "Consistent Hashing", def: "Hash nodes and keys to a ring (0 to 2^32-1). Key assigned to next node clockwise. Adding/removing node only remaps keys that were on that node — not the whole dataset. Used by Cassandra, DynamoDB, Kafka with custom partitioners, CDNs.", tags: ["math", "distributed"] },
      { name: "Merkle Trees", def: "Binary tree where each leaf is hash of data, each internal node is hash of children. Root hash represents entire dataset. If root matches, data unchanged. Used by: Git (object graph), Cassandra (anti-entropy repair), Bitcoin. Efficient comparison of large datasets.", tags: ["math", "distributed"] },
      { name: "State Machines (FSM)", def: "Finite set of states + transitions triggered by events. Deterministic FSM: one transition per (state, input). Example: TCP connection states (CLOSED→SYN_SENT→ESTABLISHED→FIN_WAIT_1...). Order workflow states. Spring State Machine library models FSMs.", tags: ["math", "design"] },
      { name: "Regular Expressions (Theory)", def: "Formal language defined by a pattern, recognized by Finite Automata. Regex engine compiles pattern to NFA/DFA. Java `Pattern.compile()` compiles once, reuse for performance. Catastrophic backtracking: nested quantifiers on ambiguous patterns → O(2^n) — source of ReDOS attacks.", tags: ["math", "programming"] },
      { name: "Floating Point (IEEE 754)", def: "32-bit float: 1 sign + 8 exponent + 23 mantissa bits. 0.1 + 0.2 ≠ 0.3 in floating point. Never use float/double for money — use BigDecimal. NaN (0/0), Infinity (1/0). Epsilon comparison: `Math.abs(a-b) < 1e-9` instead of `a == b`.", tags: ["math", "programming"] },
      { name: "Recursion Theory & Computability", def: "Turing Machines define computability limits. Halting Problem: no program can decide if arbitrary program halts. P vs NP: P = polynomial-time solvable, NP = polynomial-time verifiable. NP-complete problems (knapsack, SAT) require heuristics/approximations in practice.", tags: ["math", "theory"] },
    ]
  },
  {
    id: "cookies-sessions-storage",
    title: "Cookies, Sessions & Browser Storage",
    icon: "🍪",
    color: "c2",
    terms: [
      { name: "HTTP Cookie", def: "Key-value pair stored by browser, sent with every request to the same domain via Cookie header. Server sets via Set-Cookie response header. Example: `Set-Cookie: sessionId=abc123; HttpOnly; Secure; SameSite=Strict; Max-Age=3600`. Persists across tabs.", tags: ["cookies", "web", "security"] },
      { name: "Cookie Attributes", def: "HttpOnly: not accessible via JS (prevents XSS theft). Secure: HTTPS only. SameSite=Strict/Lax/None: CSRF protection. Domain/Path: scope. Max-Age/Expires: lifetime. Omitting Max-Age = session cookie (dies with browser tab).", tags: ["cookies", "security"] },
      { name: "Session Cookie vs Persistent Cookie", def: "Session cookie: no Max-Age/Expires, lives until browser closes. Persistent cookie: has expiry, survives restarts. Example: 'Remember me' checkbox sets a persistent cookie. Auth cookies are typically session cookies for security.", tags: ["cookies"] },
      { name: "Server-Side Session", def: "Session ID stored in cookie; actual data stored server-side (memory, Redis, DB). Stateful. Spring: HttpSession backed by Redis (spring-session). Scale-out challenge: sticky sessions or shared session store. Example: `session.setAttribute('user', userObj)`.", tags: ["cookies", "spring"] },
      { name: "JWT vs Session Cookies", def: "JWT: stateless, self-contained, scales horizontally (no server store). Cookie session: stateful, easy revocation, smaller payload. JWT risk: revocation is hard before expiry. Best practice for banking APIs: short-lived JWT (15 min) + refresh token in HttpOnly cookie.", tags: ["cookies", "security", "jwt"] },
      { name: "localStorage", def: "Browser key-value store, ~5MB, persistent across sessions, same-origin. JS only: `localStorage.setItem('key', value)`. NOT sent to server. Risk: accessible to XSS — never store tokens here. Use for non-sensitive UI preferences.", tags: ["cookies", "web"] },
      { name: "sessionStorage", def: "Same API as localStorage but scoped to tab and cleared when tab closes. ~5MB. Safe from other tabs. Still XSS vulnerable. Use for multi-step form state within a single session flow.", tags: ["cookies", "web"] },
      { name: "IndexedDB", def: "Browser-side NoSQL database. Large storage (hundreds of MB+). Async API. Supports indexes, transactions. Use for offline-capable web apps (PWA), large datasets. Never for sensitive data.", tags: ["cookies", "web"] },
      { name: "Same-Origin Policy (SOP)", def: "Browser security: pages can only read data from same origin (protocol + domain + port). Blocks JS from reading `fetch('https://evil.com')` results. Protects session cookies. CORS is the controlled exception to SOP.", tags: ["cookies", "security", "networking"] },
      { name: "Cookie Theft & Session Hijacking", def: "Attacker steals session cookie to impersonate user. Methods: XSS (reading document.cookie), network sniff (non-HTTPS), malware. Defenses: HttpOnly, Secure, short TTL, IP binding, re-auth for sensitive actions (bank transfers).", tags: ["cookies", "security"] },
      { name: "Spring Session Management", def: "`spring-session-data-redis` stores sessions in Redis. `@EnableRedisHttpSession`. Session fixation protection: Spring regenerates session ID on login. Concurrent session control: limit sessions per user. `SessionRegistry` tracks active sessions.", tags: ["cookies", "spring"] },
      { name: "CSRF Tokens", def: "Server embeds secret token in form/header. Client must echo it on state-changing requests (POST/PUT/DELETE). Attacker cross-site form can't read the token (blocked by SOP). Spring Security generates CSRF tokens automatically. REST APIs with JWT don't need CSRF (no cookies).", tags: ["cookies", "security"] },
    ]
  },
  {
    id: "caching-deep",
    title: "Caching — Deep Dive",
    icon: "⚡",
    color: "c3",
    terms: [
      { name: "Why Cache?", def: "Cache exploits the fact that 80% of requests hit 20% of data (Pareto principle). Reduces DB load, lowers latency, saves cost. Rule: cache what is read often and changes rarely. Never cache frequently mutating data without careful invalidation.", tags: ["caching", "performance"] },
      { name: "Cache Hit & Miss", def: "Hit: requested data found in cache → fast return. Miss: not found → fetch from origin, populate cache. Hit rate = hits / total requests. Target >90% for effective caching. Cold start (empty cache) causes initial miss storm — use cache warming.", tags: ["caching"] },
      { name: "Cache-Aside (Lazy Loading)", def: "App checks cache first. Miss → load from DB → store in cache → return. Most common pattern. Example: `cache.get(key)` → null → `db.find(id)` → `cache.put(key, val, TTL)`. Risk: thundering herd on cold start (many simultaneous misses).", tags: ["caching", "patterns"] },
      { name: "Write-Through Cache", def: "Every write updates cache AND DB synchronously. Cache always consistent. Higher write latency. Good for read-heavy, write-infrequent data. Risk: unnecessary caching of data never read. Example: user profile updates.", tags: ["caching", "patterns"] },
      { name: "Write-Behind (Write-Back)", def: "Write to cache immediately, DB update async (buffered). Ultra-fast writes. Risk: data loss if cache crashes before flush. Use for high-write scenarios with acceptable eventual persistence (analytics counters, gaming leaderboards).", tags: ["caching", "patterns"] },
      { name: "Read-Through Cache", def: "Cache sits in front of DB. On miss, cache itself loads from DB (not the application). Simplifies app code. Used by Redis with RedisGears or application-level with Spring's @Cacheable — method result auto-cached on first call.", tags: ["caching", "patterns"] },
      { name: "TTL (Time-To-Live)", def: "Expiry duration after which cache entry is evicted. Short TTL: fresh data, more DB load. Long TTL: stale risk, less load. Set TTL based on data change frequency. Random jitter ± 10-20% prevents cache stampedes (all entries expiring simultaneously).", tags: ["caching"] },
      { name: "Cache Eviction Policies", def: "LRU (Least Recently Used): evict oldest-accessed. LFU (Least Frequently Used): evict least-accessed count. FIFO: evict oldest-inserted. Random. TTL-based. Redis default: noeviction (errors when full) or allkeys-lru. Choose based on access patterns.", tags: ["caching"] },
      { name: "Cache Stampede / Thundering Herd", def: "Many cache misses simultaneously hammering DB. Causes: cache expiry of popular key, cold restart. Fixes: mutex lock on cache miss (one thread fetches, others wait), probabilistic early expiration (refresh before TTL expires), background refresh.", tags: ["caching", "performance"] },
      { name: "Cache Invalidation Strategies", def: "1. TTL-based expiry (simple, may serve stale). 2. Event-driven invalidation (publish event on write, subscribers evict). 3. Write-through (always consistent). Cache invalidation is famously one of the hardest problems in CS.", tags: ["caching", "patterns"] },
      { name: "Distributed Cache (Redis Cluster)", def: "Redis Cluster: data sharded across N nodes using consistent hashing (16384 hash slots). Each node holds a slot range. Reads/writes to correct node. Replication: each primary has replicas. Failover: replica promoted if primary fails.", tags: ["caching", "distributed"] },
      { name: "Local Cache (In-Process)", def: "In-JVM cache: Caffeine, Guava Cache. Sub-microsecond access (no network). Risk: stale data across instances. Use for immutable or low-change reference data (country codes, config values). Caffeine supports async refresh, stats, eviction callbacks.", tags: ["caching", "java"] },
      { name: "Two-Level Cache (L1 + L2)", def: "L1: local in-JVM Caffeine (nanoseconds). L2: shared Redis (milliseconds). Check L1 first, then L2, then DB. L1 populated from L2. Invalidation: write to DB → evict Redis → broadcast eviction to all JVM L1 caches via pub/sub.", tags: ["caching", "advanced"] },
      { name: "Spring @Cacheable", def: "`@Cacheable(value='users', key='#id')` on method: returns cached result on subsequent calls with same key. `@CacheEvict`: removes entry. `@CachePut`: updates cache after method executes. Backed by CaffeineCacheManager or RedisCacheManager.", tags: ["caching", "spring"] },
      { name: "Cache Warming", def: "Pre-populate cache before traffic arrives. Strategies: startup preload (load top-N records from DB on app start), shadow reads (replay production traffic), scheduled refresh. Prevents cold start miss storms after deployments.", tags: ["caching", "ops"] },
      { name: "Content-Based Cache Keys", def: "Cache key must uniquely represent the query. Pitfall: caching user-specific data without including userId in key. Example: `users::{userId}::profile`. Use composite keys for parameterized queries. Hash long keys for Redis key length limits.", tags: ["caching"] },
      { name: "HTTP Caching Headers", def: "Cache-Control: max-age=3600, no-cache, no-store, private, public. ETag: fingerprint of response, enables conditional requests (If-None-Match). Last-Modified + If-Modified-Since. CDNs and browsers respect these. Spring: ResponseEntity with CacheControl headers.", tags: ["caching", "networking", "api"] },
    ]
  },
  {
    id: "multithreading-deep",
    title: "Multithreading & Concurrency — Deep Dive",
    icon: "🧵",
    color: "c1",
    terms: [
      { name: "Thread Lifecycle in Java", def: "NEW (created, not started) → RUNNABLE (running or ready) → BLOCKED (waiting for monitor lock) → WAITING (Object.wait(), Thread.join() indefinitely) → TIMED_WAITING (sleep(ms), wait(timeout)) → TERMINATED. Check via thread dump (jstack).", tags: ["concurrency", "java"] },
      { name: "Creating Threads", def: "1. Extend Thread: `class MyThread extends Thread { public void run() {...} }`. 2. Implement Runnable: `new Thread(myRunnable).start()`. 3. Lambda: `new Thread(() -> doWork()).start()`. 4. ExecutorService (preferred in production — manages pool).", tags: ["concurrency", "java"] },
      { name: "synchronized Keyword", def: "Intrinsic lock on object/class. Method: `public synchronized void deposit(int amount)` — locks on `this`. Block: `synchronized(lock) { ... }` — locks on `lock`. Reentrant: same thread can re-acquire its own lock. Releases on exit or exception.", tags: ["concurrency", "java"] },
      { name: "volatile Keyword", def: "Guarantees visibility (reads/writes go to main memory, not CPU cache) and prevents instruction reordering. Does NOT guarantee atomicity. Example: `volatile boolean running = true;` — reliable stop flag. Use for simple flag variables, not compound operations.", tags: ["concurrency", "java"] },
      { name: "Atomic Classes", def: "java.util.concurrent.atomic: AtomicInteger, AtomicLong, AtomicBoolean, AtomicReference. CAS (Compare-And-Swap) operations — hardware-level atomicity without locks. Example: `atomicInt.incrementAndGet()` is atomic; `i++` on regular int is not (read-modify-write, 3 steps).", tags: ["concurrency", "java"] },
      { name: "ReentrantLock", def: "Explicit lock with more control than synchronized. `lock.lock()` / `lock.unlock()` (always in finally). tryLock(timeout): avoid indefinite blocking. Fair mode: FIFO queue. ReentrantReadWriteLock: multiple concurrent readers OR one writer.", tags: ["concurrency", "java"] },
      { name: "Lock Striping", def: "Divide one coarse lock into N finer locks, each protecting a subset of data. ConcurrentHashMap uses 16 segments (Java 7) / per-bucket CAS (Java 8). Reduces contention: only threads hitting the same stripe block each other.", tags: ["concurrency", "performance"] },
      { name: "ThreadLocal", def: "Per-thread storage — each thread sees its own value. Example: `ThreadLocal<SimpleDateFormat> sdf = ThreadLocal.withInitial(SimpleDateFormat::new)`. Spring uses ThreadLocal for SecurityContext, request scope. Leak risk: always remove() in finally (thread pool reuses threads).", tags: ["concurrency", "java"] },
      { name: "ExecutorService Deep Dive", def: "FixedThreadPool(n): bounded threads, queue unbounded — memory risk under load. CachedThreadPool: creates threads on demand, reuses idle — OOM risk. WorkStealingPool: ForkJoinPool-based, parallel(). Shutdown: shutdown() + awaitTermination() for graceful stop.", tags: ["concurrency", "java"] },
      { name: "ForkJoinPool & Work Stealing", def: "Divide-and-conquer parallelism. Task split into subtasks (fork), joined after completion. Work stealing: idle threads steal tasks from busy threads' queues. Used by Stream.parallelStream() and CompletableFuture.supplyAsync() (default pool). CPU-bound tasks benefit most.", tags: ["concurrency", "java"] },
      { name: "CompletableFuture Chaining", def: "`supplyAsync(() -> fetchUser(id))` runs async. `.thenApply(user -> enrich(user))` transforms result. `.thenCompose(user -> fetchOrders(user))` chains another async. `.thenCombine(cf2, (a,b) -> merge(a,b))` joins two futures. `.exceptionally(e -> fallback)` handles errors.", tags: ["concurrency", "java", "async"] },
      { name: "CountDownLatch", def: "Countdown from N to 0; awaiting threads unblock when count hits zero. Example: `new CountDownLatch(3)` — main thread waits for 3 workers to finish. One-shot use (non-resettable). Useful for test synchronization and parallel startup coordination.", tags: ["concurrency", "java"] },
      { name: "CyclicBarrier", def: "All N threads wait at barrier until all arrive, then proceed together. Reusable (unlike CountDownLatch). Example: parallel simulation phases — all threads complete phase 1 before any starts phase 2. Optional barrier action runs when all arrive.", tags: ["concurrency", "java"] },
      { name: "Semaphore for Rate Limiting", def: "`Semaphore(10)` — max 10 concurrent. `semaphore.acquire()` before critical section, `semaphore.release()` in finally. Controls concurrency to downstream: `Semaphore dbSemaphore = new Semaphore(20)` limits simultaneous DB connections in service layer.", tags: ["concurrency", "java"] },
      { name: "BlockingQueue", def: "`put()` blocks if full, `take()` blocks if empty. Implementations: ArrayBlockingQueue (bounded), LinkedBlockingQueue (optionally bounded), PriorityBlockingQueue, SynchronousQueue (hand-off). Foundation of producer-consumer pattern without manual wait/notify.", tags: ["concurrency", "java"] },
      { name: "ConcurrentHashMap Internals", def: "Java 8+: array of Node bins, CAS for lock-free puts on empty bins, synchronized on bin head for collisions. No full-table lock. computeIfAbsent(), merge(), forEach() are atomic compound operations. putIfAbsent() for idempotent cache loading.", tags: ["concurrency", "java"] },
      { name: "Livelock", def: "Threads keep responding to each other but make no progress. Example: two threads both retry the same conflicting action simultaneously. Unlike deadlock, threads aren't blocked — they're active but stuck in a loop. Fix: randomized backoff (Ethernet CSMA/CD uses this).", tags: ["concurrency"] },
      { name: "Starvation", def: "Thread permanently denied access to resources because higher-priority or luckier threads always win. Can happen with unfair locks (non-fair ReentrantLock). Fix: fair locking, priority management, bounded waiting queues.", tags: ["concurrency"] },
      { name: "Thread Dump Analysis", def: "`jstack <pid>` captures all thread states and stack traces. Look for: BLOCKED threads (deadlock), WAITING threads (pool starvation), high-CPU RUNNABLE threads (spin loop). jvisualvm, IntelliJ thread dump analyzer parse output visually.", tags: ["concurrency", "ops"] },
      { name: "Virtual Threads (Project Loom)", def: "Java 21+: lightweight JVM-managed threads. `Thread.ofVirtual().start(() -> ...)`. Millions can exist (vs thousands of OS threads). Blocking I/O mounts/unmounts virtual thread from carrier thread — no OS thread blocked. RevolutioniZes high-concurrency servers without reactive code.", tags: ["concurrency", "java"] },
    ]
  },
  {
    id: "java-cheatsheet",
    title: "Java Developer Cheat Sheet",
    icon: "📋",
    color: "c2",
    terms: [
      { name: "Primitive Types & Sizes", def: "byte(1B,-128..127), short(2B), int(4B,-2^31..2^31-1), long(8B,append L: 100L), float(4B,append f: 3.14f), double(8B), char(2B,Unicode), boolean(JVM-specific,~1B). Primitives live on stack; wrappers (Integer,Long) live on heap.", tags: ["java", "cheatsheet"] },
      { name: "String Methods Cheat Sheet", def: "`s.length()`, `s.charAt(i)`, `s.substring(start,end)`, `s.indexOf('x')`, `s.contains(\"abc\")`, `s.replace('a','b')`, `s.split(\",\")`, `s.trim()`, `s.toUpperCase()`, `s.startsWith(\"http\")`, `s.isEmpty()`, `s.isBlank()` (Java 11+).", tags: ["java", "cheatsheet"] },
      { name: "Collections Quick Reference", def: "List: `new ArrayList<>()`, `add(e)`, `get(i)`, `remove(i)`, `size()`. Map: `new HashMap<>()`, `put(k,v)`, `get(k)`, `getOrDefault(k,def)`, `containsKey(k)`, `entrySet()`. Set: `new HashSet<>()`, `add(e)`, `contains(e)`. Queue: `new LinkedList<>()`, `offer(e)`, `poll()`.", tags: ["java", "cheatsheet"] },
      { name: "Stream Cheat Sheet", def: "`list.stream().filter(x->x>0).map(x->x*2).sorted().distinct().limit(10).collect(Collectors.toList())`. GroupBy: `.collect(groupingBy(User::getDept))`. Count: `.count()`. AnyMatch: `.anyMatch(x->x.isActive())`. FlatMap: `.flatMap(u->u.getRoles().stream())`.", tags: ["java", "cheatsheet"] },
      { name: "Optional Cheat Sheet", def: "`Optional.of(val)` — throws NPE if null. `Optional.ofNullable(val)` — safe. `opt.isPresent()`, `opt.get()`, `opt.orElse(default)`, `opt.orElseGet(()->compute())`, `opt.orElseThrow(()->new Ex())`, `opt.map(u->u.getName())`, `opt.filter(u->u.isActive())`.", tags: ["java", "cheatsheet"] },
      { name: "Exception Handling Patterns", def: "Try-with-resources: `try(Connection c = ds.getConnection()) { ... }` — auto-closes. Multi-catch: `catch(IOException | SQLException e)`. Custom exception: `class InsufficientFundsException extends RuntimeException { public InsufficientFundsException(String msg) { super(msg); } }`.", tags: ["java", "cheatsheet"] },
      { name: "Comparator Cheat Sheet", def: "`list.sort(Comparator.comparing(User::getName))`. Reversed: `.reversed()`. ThenComparing: `.thenComparing(User::getAge)`. Null-safe: `Comparator.nullsLast(Comparator.naturalOrder())`. Natural order: `Comparator.naturalOrder()`. Custom: `(a,b) -> a.getScore()-b.getScore()`.", tags: ["java", "cheatsheet"] },
      { name: "Java Date/Time (java.time)", def: "`LocalDate.now()`, `LocalDateTime.now()`, `ZonedDateTime.now(ZoneId.of(\"Asia/Kolkata\"))`. Parse: `LocalDate.parse(\"2024-01-15\")`. Format: `date.format(DateTimeFormatter.ofPattern(\"dd-MM-yyyy\"))`. Plus/minus: `.plusDays(7)`, `.minusMonths(1)`. Duration vs Period.", tags: ["java", "cheatsheet"] },
      { name: "Enum Best Practices", def: "Enums are singletons. Add fields: `enum Status { ACTIVE(1), INACTIVE(0); final int code; Status(int c){this.code=c;} }`. Switch on enum. `Status.valueOf(\"ACTIVE\")`. `EnumSet`, `EnumMap` are efficient. Use enums for fixed sets (status codes, currencies, event types).", tags: ["java", "cheatsheet"] },
      { name: "Record Classes (Java 16+)", def: "`record UserDTO(String name, int age) {}` — auto-generates constructor, getters, equals, hashCode, toString. Immutable. Use for DTOs, value objects. Compact constructor: `record Range(int lo, int hi) { Range { if(lo>hi) throw new IllegalArgumentException(); } }`.", tags: ["java", "cheatsheet"] },
      { name: "Sealed Classes (Java 17+)", def: "Restrict which classes can extend/implement. `sealed interface Shape permits Circle, Rectangle {}`. Enables exhaustive pattern matching in switch. Useful for modeling domain types (Result, Either) where only known subtypes are valid.", tags: ["java", "cheatsheet"] },
      { name: "Pattern Matching (Java 16-21+)", def: "`instanceof` with binding: `if(obj instanceof String s) { s.length(); }`. Switch pattern (Java 21): `switch(shape) { case Circle c -> Math.PI*c.r()*c.r(); case Rectangle r -> r.w()*r.h(); }`. Eliminates verbose casting.", tags: ["java", "cheatsheet"] },
      { name: "Useful Java Utilities", def: "`Collections.unmodifiableList(list)`, `Collections.singletonList(x)`, `List.of(a,b,c)` (immutable), `Map.of(k1,v1,k2,v2)`. `Objects.requireNonNull(x,\"msg\")`. `Arrays.asList(arr)`. `Math.min/max/abs/pow/ceil/floor`. `System.currentTimeMillis()` vs `Instant.now()`.", tags: ["java", "cheatsheet"] },
      { name: "Lombok Annotations", def: "`@Data` = @Getter+@Setter+@EqualsAndHashCode+@ToString+@RequiredArgsConstructor. `@Builder` for builder pattern. `@Slf4j` injects `log` field. `@NoArgsConstructor/@AllArgsConstructor`. `@Value` = immutable @Data. Reduces boilerplate but be cautious with @Data on JPA entities (equals/hashCode issues).", tags: ["java", "cheatsheet"] },
      { name: "Jackson JSON Annotations", def: "`@JsonProperty(\"user_name\")` — custom field name. `@JsonIgnore` — exclude field. `@JsonInclude(NON_NULL)` — skip nulls. `@JsonAlias({\"id\",\"userId\"})` — accept multiple names. `@JsonFormat(pattern=\"yyyy-MM-dd\")` — date format. `@JsonSerialize/@JsonDeserialize` — custom logic.", tags: ["java", "cheatsheet", "spring"] },
    ]
  },
  {
    id: "spring-cheatsheet",
    title: "Spring Boot Cheat Sheet",
    icon: "🌿",
    color: "c3",
    terms: [
      { name: "Spring Boot Auto-Configuration", def: "META-INF/spring/org.springframework.boot.autoconfigure.AutoConfiguration.imports lists auto-configs. @ConditionalOnClass, @ConditionalOnMissingBean — activate only if conditions met. `spring.autoconfigure.exclude=DataSourceAutoConfiguration` disables specific ones. Debug: `--debug` flag logs condition report.", tags: ["spring", "cheatsheet"] },
      { name: "application.yml Structure", def: "Hierarchical config. `server.port: 8080`. `spring.datasource.url: jdbc:postgresql://localhost:5432/db`. `spring.profiles.active: dev`. Override via env vars: `SPRING_DATASOURCE_URL=...`. Command-line: `--server.port=9090`. Profile file: `application-dev.yml`.", tags: ["spring", "cheatsheet"] },
      { name: "@ConfigurationProperties", def: "`@ConfigurationProperties(prefix='app.kafka')` binds `app.kafka.bootstrapServers`, `app.kafka.topic` to fields. Add `@EnableConfigurationProperties(KafkaProps.class)`. Validated via `@Validated` + JSR-303 annotations. Better than many `@Value` annotations.", tags: ["spring", "cheatsheet"] },
      { name: "Spring REST Controller Template", def: "`@RestController @RequestMapping('/api/v1/accounts') public class AccountController { @Autowired AccountService svc; @GetMapping('/{id}') public ResponseEntity<AccountDTO> get(@PathVariable Long id) { return ResponseEntity.ok(svc.findById(id)); } @PostMapping public ResponseEntity<AccountDTO> create(@Valid @RequestBody CreateAccountReq req) { return ResponseEntity.status(201).body(svc.create(req)); } }`", tags: ["spring", "cheatsheet"] },
      { name: "Global Exception Handler", def: "`@ControllerAdvice class GlobalExHandler { @ExceptionHandler(ResourceNotFoundException.class) @ResponseStatus(NOT_FOUND) public ErrorResponse handle(ResourceNotFoundException ex) { return new ErrorResponse('NOT_FOUND', ex.getMessage(), Instant.now()); } @ExceptionHandler(MethodArgumentNotValidException.class) public ResponseEntity<Map> handleValidation(MethodArgumentNotValidException ex) { ... } }`", tags: ["spring", "cheatsheet"] },
      { name: "Spring Data JPA Quick Reference", def: "`interface UserRepo extends JpaRepository<User,Long> { Optional<User> findByEmail(String email); List<User> findByStatusAndCreatedAtAfter(Status s, LocalDate d); @Query(\"SELECT u FROM User u WHERE u.balance > :min\") List<User> findRich(@Param('min') BigDecimal min); @Modifying @Query(\"UPDATE User u SET u.status=:s WHERE u.id=:id\") int updateStatus(@Param('s') Status s, @Param('id') Long id); }`", tags: ["spring", "cheatsheet", "database"] },
      { name: "Validation Annotations", def: "`@Valid` on @RequestBody triggers validation. Field annotations: `@NotNull`, `@NotBlank`, `@NotEmpty`, `@Size(min=2,max=50)`, `@Min(0)`, `@Max(100)`, `@Email`, `@Pattern(regexp='[A-Z]{2}')`, `@Positive`, `@Future`, `@Past`. Custom: implement `ConstraintValidator<MyAnnotation, String>`.", tags: ["spring", "cheatsheet"] },
      { name: "Spring Security JWT Setup", def: "Filter chain: JwtAuthFilter extends OncePerRequestFilter → extract token from `Authorization: Bearer <token>` header → validate signature + expiry → set `SecurityContextHolder.getContext().setAuthentication(auth)`. `.authorizeHttpRequests().requestMatchers('/api/public/**').permitAll().anyRequest().authenticated()`.", tags: ["spring", "cheatsheet", "security"] },
      { name: "Spring Actuator Endpoints", def: "Enable: `management.endpoints.web.exposure.include=health,metrics,info,prometheus`. `/actuator/health` — UP/DOWN + components. `/actuator/metrics/jvm.memory.used` — specific metric. `/actuator/prometheus` — Prometheus scrape. `/actuator/env` — all properties (sensitive!). Custom: implement `HealthIndicator`.", tags: ["spring", "cheatsheet", "ops"] },
      { name: "Spring Boot Testing Quick Reference", def: "`@SpringBootTest(webEnvironment=RANDOM_PORT)` — full context. `@WebMvcTest(MyController.class)` — controller only, mock service. `@DataJpaTest` — JPA only, H2 by default. `MockMvc.perform(get('/api/users')).andExpect(status().isOk()).andExpect(jsonPath('$[0].name').value('Bharath'))`. `@MockBean` to mock Spring beans.", tags: ["spring", "cheatsheet", "testing"] },
      { name: "Async with @Async", def: "Add `@EnableAsync` on config class. Method: `@Async public CompletableFuture<String> sendEmail(String to) { ... return CompletableFuture.completedFuture('sent'); }`. Configure pool: `@Bean TaskExecutor asyncExecutor() { ThreadPoolTaskExecutor e = new ThreadPoolTaskExecutor(); e.setCorePoolSize(5); e.setMaxPoolSize(20); e.setQueueCapacity(100); return e; }`", tags: ["spring", "cheatsheet", "async"] },
      { name: "Spring Cache Quick Setup", def: "1. Add spring-boot-starter-cache + caffeine. 2. `@EnableCaching` on main class. 3. `spring.cache.type=caffeine`, `spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=10m`. 4. `@Cacheable('users')` on service method. 5. `@CacheEvict(value='users', key='#id')` on delete method.", tags: ["spring", "cheatsheet", "caching"] },
      { name: "Environment & Profile Tips", def: "Run with profile: `java -jar app.jar --spring.profiles.active=prod`. Docker: `-e SPRING_PROFILES_ACTIVE=prod`. Check active profile: `@Autowired Environment env; env.getActiveProfiles()`. `@Profile('!prod')` — active unless prod. `@ConditionalOnProperty(name='feature.x.enabled', havingValue='true')`.", tags: ["spring", "cheatsheet"] },
      { name: "Spring Boot Startup Optimization", def: "Lazy init: `spring.main.lazy-initialization=true` (slower first request). Exclude unused auto-configs. Use `@Import` instead of component scan where possible. GraalVM native image for instant startup. Virtual threads (Spring Boot 3.2+): `spring.threads.virtual.enabled=true`.", tags: ["spring", "cheatsheet", "performance"] },
    ]
  },
  {
    id: "docker-k8s-cheatsheet",
    title: "Docker & Kubernetes Cheat Sheet",
    icon: "🐳",
    color: "c1",
    terms: [
      { name: "Docker Core Concepts", def: "Image: immutable blueprint (layers). Container: running instance of image. Dockerfile: instructions to build image. Registry: image store (Docker Hub, ECR, GCR). Volume: persistent storage outside container. Network: container-to-container communication.", tags: ["docker", "cheatsheet", "devops"] },
      { name: "Essential Docker Commands", def: "`docker build -t myapp:1.0 .` Build image. `docker run -d -p 8080:8080 --name app myapp:1.0` Run detached. `docker ps` List running. `docker logs -f app` Stream logs. `docker exec -it app bash` Shell into container. `docker stop app` Graceful stop. `docker rm app` Remove. `docker images` List images. `docker rmi myapp:1.0` Remove image.", tags: ["docker", "cheatsheet"] },
      { name: "Dockerfile Best Practices", def: "Use multi-stage builds (build in JDK image, run in JRE). Order layers: rarely changing first (dependencies) → often changing last (code). One process per container. Non-root user: `USER appuser`. COPY specific files not `.`. Use `.dockerignore`. Pin base image versions: `FROM eclipse-temurin:21-jre-alpine`.", tags: ["docker", "cheatsheet"] },
      { name: "Spring Boot Dockerfile (Multi-Stage)", def: "`FROM maven:3.9-eclipse-temurin-21 AS build\nWORKDIR /app\nCOPY pom.xml .\nRUN mvn dependency:go-offline\nCOPY src ./src\nRUN mvn package -DskipTests\nFROM eclipse-temurin:21-jre-alpine\nWORKDIR /app\nCOPY --from=build /app/target/*.jar app.jar\nEXPOSE 8080\nENTRYPOINT [\"java\",\"-jar\",\"app.jar\"]`", tags: ["docker", "cheatsheet", "spring"] },
      { name: "docker-compose Essentials", def: "`services: app: build: . ports: ['8080:8080'] environment: - SPRING_PROFILES_ACTIVE=dev depends_on: [db, redis] db: image: postgres:15 environment: POSTGRES_PASSWORD: secret volumes: [pgdata:/var/lib/postgresql/data] redis: image: redis:7-alpine`. `docker compose up -d`, `down`, `logs -f app`.", tags: ["docker", "cheatsheet"] },
      { name: "Docker Networking", def: "bridge: default, containers on same host communicate by name. host: container shares host network (no isolation). none: no networking. overlay: multi-host (Swarm/K8s). `docker network create mynet`. `docker run --network mynet`. Containers on same compose network resolve each other by service name.", tags: ["docker", "cheatsheet"] },
      { name: "Docker Volumes", def: "Named volume: `docker volume create mydata`. Mount: `-v mydata:/var/lib/postgresql/data`. Bind mount: `-v $(pwd)/config:/app/config` (host dir in container). tmpfs: in-memory, `--tmpfs /tmp`. Volumes survive container deletion; bind mounts reflect host changes live (useful for dev).", tags: ["docker", "cheatsheet"] },
      { name: "Kubernetes Core Objects", def: "Pod: smallest deployable unit (1+ containers). ReplicaSet: maintains N pod copies. Deployment: manages ReplicaSets + rolling updates. Service: stable network endpoint for pods. ConfigMap: non-secret config. Secret: base64-encoded sensitive config. Namespace: logical cluster isolation.", tags: ["kubernetes", "cheatsheet"] },
      { name: "Essential kubectl Commands", def: "`kubectl get pods -n myns` List pods. `kubectl describe pod mypod` Details + events. `kubectl logs mypod -f` Stream logs. `kubectl exec -it mypod -- bash` Shell. `kubectl apply -f deployment.yaml` Apply manifest. `kubectl delete -f deployment.yaml`. `kubectl scale deployment myapp --replicas=3`. `kubectl rollout status deployment/myapp`. `kubectl rollout undo deployment/myapp`.", tags: ["kubernetes", "cheatsheet"] },
      { name: "Spring Boot Deployment YAML", def: "`apiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: payment-service\nspec:\n  replicas: 3\n  selector:\n    matchLabels: {app: payment}\n  template:\n    metadata:\n      labels: {app: payment}\n    spec:\n      containers:\n      - name: payment\n        image: myregistry/payment:1.0\n        ports: [{containerPort: 8080}]\n        env:\n        - name: SPRING_PROFILES_ACTIVE\n          value: prod\n        resources:\n          requests: {cpu: 250m, memory: 512Mi}\n          limits: {cpu: 500m, memory: 1Gi}`", tags: ["kubernetes", "cheatsheet", "spring"] },
      { name: "Kubernetes Service Types", def: "ClusterIP (default): only within cluster. NodePort: exposes on each node's IP:port (30000-32767), for dev. LoadBalancer: provisions cloud LB, external traffic. ExternalName: CNAME alias to external DNS. For prod: LoadBalancer or Ingress (L7 routing) in front of ClusterIP services.", tags: ["kubernetes", "cheatsheet"] },
      { name: "ConfigMap & Secret Usage", def: "`kubectl create configmap app-config --from-literal=APP_ENV=prod`. Mount as env: `envFrom: [{configMapRef: {name: app-config}}]`. Mount as file: `volumes: [{name: cfg, configMap: {name: app-config}}]`. Secret: `kubectl create secret generic db-secret --from-literal=password=s3cr3t`. Ref: `valueFrom: {secretKeyRef: {name: db-secret, key: password}}`.", tags: ["kubernetes", "cheatsheet"] },
      { name: "Liveness & Readiness Probes", def: "`livenessProbe: httpGet: {path: /actuator/health/liveness, port: 8080} initialDelaySeconds: 30 periodSeconds: 10 failureThreshold: 3` — restarts pod if fails. `readinessProbe: httpGet: {path: /actuator/health/readiness, port: 8080}` — removes from service if fails. Spring Boot 2.3+ exposes both automatically.", tags: ["kubernetes", "cheatsheet", "spring"] },
      { name: "Resource Requests & Limits", def: "Request: guaranteed resources (used for scheduling). Limit: max allowed (throttled/OOM-killed if exceeded). CPU: `500m` = 0.5 CPU core. Memory: `512Mi`. Set requests ≈ typical usage, limits ≈ 2x requests. OOMKilled = limit too low. Throttled = CPU limit too low. Always set both in production.", tags: ["kubernetes", "cheatsheet", "performance"] },
      { name: "HorizontalPodAutoscaler (HPA)", def: "`kubectl autoscale deployment payment --cpu-percent=70 --min=2 --max=10`. Scales based on CPU/memory/custom metrics. Metrics Server must be installed. Custom metrics via Prometheus Adapter. Combine with PodDisruptionBudget (PDB) to ensure rolling updates don't take all pods down.", tags: ["kubernetes", "cheatsheet", "scalability"] },
      { name: "Ingress (L7 Routing)", def: "`apiVersion: networking.k8s.io/v1 kind: Ingress metadata: {name: api-ingress, annotations: {nginx.ingress.kubernetes.io/rewrite-target: /}} spec: rules: [{host: api.mybank.com, http: {paths: [{path: /payments, pathType: Prefix, backend: {service: {name: payment-svc, port: {number: 8080}}}}]}}]`. Requires Ingress Controller (NGINX, Traefik, AWS ALB).", tags: ["kubernetes", "cheatsheet", "networking"] },
      { name: "Kubernetes Namespaces Strategy", def: "Separate environments: `dev`, `staging`, `prod` namespaces in same cluster (or separate clusters for prod). RBAC per namespace. ResourceQuotas limit total CPU/memory per namespace. NetworkPolicies restrict cross-namespace traffic. `kubectl config set-context --current --namespace=prod`.", tags: ["kubernetes", "cheatsheet"] },
      { name: "Rolling Update Strategy", def: "`strategy: type: RollingUpdate rollingUpdate: {maxSurge: 1, maxUnavailable: 0}` — adds one new pod before removing one old (zero downtime). Rollback: `kubectl rollout undo deployment/myapp`. History: `kubectl rollout history deployment/myapp`. Always set readiness probes to prevent traffic to unhealthy new pods.", tags: ["kubernetes", "cheatsheet", "devops"] },
    ]
  },

  // ─── SYSTEM DESIGN PRIMER ────────────────────────────────────────────
  {
    id: "system-design",
    title: "System Design Primer (donnemartin + ByteByteGo)",
    icon: "🏛️",
    color: "c1",
    terms: [
      { name: "System Design Framework (RESHADED)", def: "Requirements → Estimation → Storage schema → High-level design → APIs → Detailed design → Evaluate bottlenecks → Distinctive features. Lead the interview; clarify functional vs non-functional requirements first. Ask about scale, latency SLA, consistency needs before drawing anything.", tags: ["system-design", "interview"] },
      { name: "Back-of-Envelope Estimation", def: "Powers of 2: 2^10=1K, 2^20=1M, 2^30=1B. Latency numbers: L1 cache hit 0.5ns, RAM 100ns, SSD 100µs, network round-trip 150ms. 1M req/sec = ~12 req/ms. 1 char = 1 byte. 1 HD photo ~1MB. These anchor capacity estimates in interviews.", tags: ["system-design", "interview"] },
      { name: "Design a URL Shortener", def: "Core: encode longURL→6-char hash (Base62: a-zA-Z0-9 = 62^6 = 56B combos). Store {shortCode, longURL, createdAt, expiresAt} in DB. Redis cache top URLs. 301 Permanent redirect (cacheable) vs 302 Temporary (trackable). Sharding on hash of shortCode. Rate-limit creation API.", tags: ["system-design", "interview"] },
      { name: "Design a Rate Limiter", def: "Algorithms: Token Bucket (allows burst, tokens replenish at rate R), Leaky Bucket (smooth output rate), Fixed Window Counter (reset every window), Sliding Window Log (precise, memory heavy), Sliding Window Counter (hybrid). Store counters in Redis (INCR + EXPIRE). Return 429 Too Many Requests. Headers: X-RateLimit-Remaining.", tags: ["system-design", "interview"] },
      { name: "Design a Key-Value Store", def: "Like Redis/DynamoDB. Components: consistent hashing for node selection, virtual nodes for even distribution, gossip protocol for membership, vector clocks for conflict resolution, Merkle trees for anti-entropy. Read/write quorum: R+W > N for strong consistency. Sloppy quorum for availability.", tags: ["system-design", "interview"] },
      { name: "Design a Notification System", def: "Components: API servers → Message Queue (Kafka per channel: push, email, SMS) → Workers per channel → 3rd party providers (APNs, FCM, Twilio, SendGrid). Retry with exponential backoff. Store notification log. Analytics: delivery rates, click rates. Template service for personalisation.", tags: ["system-design", "interview"] },
      { name: "Design a News Feed / Timeline", def: "Fan-out on write (push model): on post, write to all followers' feeds — fast read, slow write, celebrity problem. Fan-out on read (pull model): read and merge from all followings — slow read, fast write. Hybrid: fan-out write for regular users, pull for celebrities. Cache feed in Redis sorted set (score = timestamp).", tags: ["system-design", "interview"] },
      { name: "Design a Chat System (WhatsApp)", def: "WebSocket for persistent bidirectional connection. Message flow: sender → chat server → Kafka → receiver's chat server → WebSocket. Store messages in Cassandra (wide rows per conversation). Message status: sent/delivered/read receipts. Presence service: heartbeat every 5s. Media: upload to S3, send URL.", tags: ["system-design", "interview"] },
      { name: "Design a Distributed Job Scheduler", def: "Job metadata in DB (cron expression, handler, status). Distributed lock (Redis SETNX) prevents duplicate execution. Workers poll queue or use push (Kafka). Exactly-once via idempotency keys. Dead-letter queue for failed jobs. Retry with exponential backoff. Examples: Quartz (Java), Sidekiq, AWS EventBridge.", tags: ["system-design", "interview"] },
      { name: "Design YouTube / Video Upload", def: "Upload: chunked multipart upload to S3 → video processing worker (transcoding to multiple resolutions via FFmpeg) → CDN for delivery. Metadata in MySQL. View counts in Redis (flush async to DB). Recommendation: ML pipeline on watch history. Resumable uploads: track last uploaded chunk offset.", tags: ["system-design", "interview"] },
      { name: "Design a Search Autocomplete", def: "Trie for prefix matching, but in-memory only scales to small datasets. Production: Elasticsearch or Redis ZRANGEBYLEX on sorted set of {score, term}. Precompute top-K suggestions offline from query logs. Cache at CDN edge for popular prefixes. Debounce client-side (300ms) to reduce API calls.", tags: ["system-design", "interview"] },
      { name: "Design Google Drive / Dropbox", def: "Block storage: split files into 4MB blocks, deduplicate by content hash. Only upload changed blocks on update. Metadata DB: file tree, block manifest, version history. Delta sync: compare block hashes client vs server. Conflict resolution: last-write-wins or create conflict copy. CDN for frequently accessed files.", tags: ["system-design", "interview"] },
      { name: "Design a Payment System", def: "Idempotency key per transaction (UUID from client) prevents double charges. Two-phase: reserve (debit source) then confirm (credit destination). Saga for distributed transactions. Reconciliation job nightly to detect discrepancies. Audit log (append-only) for every state change. PSP integration: Stripe, Razorpay webhook confirmation.", tags: ["system-design", "interview", "fintech"] },
      { name: "Design a Distributed ID Generator", def: "Options: UUID (128-bit, no ordering), DB auto-increment (bottleneck), Twitter Snowflake (64-bit: timestamp+datacenterID+machineID+sequence, sortable, ~4096 IDs/ms/machine), Ticket Server (centralized, SPOF). Snowflake is gold standard: time-sorted, no coordination needed, fits in long.", tags: ["system-design", "interview"] },
      { name: "Scalability Patterns", def: "Scale cube: X-axis (horizontal replication), Y-axis (functional decomposition/microservices), Z-axis (data partitioning/sharding). Start with X (simplest), add Y when domain complexity requires it, add Z when data volume demands it. Don't over-engineer prematurely.", tags: ["system-design", "scalability"] },
      { name: "Latency vs Throughput", def: "Latency: time for one request to complete. Throughput: requests per second. Optimising one often hurts other. Low latency: co-locate data, reduce hops, cache at edge. High throughput: batching, async processing, pipelining, parallel workers. Aim for acceptable latency at target throughput.", tags: ["system-design", "performance"] },
      { name: "Availability vs Consistency Trade-off", def: "99.9% availability = 8.7 hrs downtime/year. 99.99% = 52 min. 99.999% = 5 min. Strong consistency: every read gets latest write (requires coordination). Eventual consistency: reads may be stale but converge. For banking: strong. For social feeds: eventual OK. Design around the SLA, not theoretical maxima.", tags: ["system-design", "distributed"] },
      { name: "Database Scaling Patterns", def: "1. Add indexes. 2. Add read replicas. 3. Add caching. 4. Vertical scale DB. 5. Denormalise for read performance. 6. Shard horizontally. 7. Move to NoSQL for specific access patterns. 8. CQRS: separate read/write models. Try each in order before jumping to sharding — premature sharding is a common mistake.", tags: ["system-design", "database"] },
    ]
  },

  // ─── DDIA (Designing Data-Intensive Applications) CONCEPTS ───────────
  {
    id: "ddia",
    title: "DDIA — Kleppmann's Key Concepts",
    icon: "📖",
    color: "c2",
    terms: [
      { name: "Reliability, Scalability, Maintainability", def: "The three pillars of DDIA. Reliability: correct behavior even when faults occur (hardware, software, human). Scalability: ability to cope with increased load (define load parameters first: RPS, concurrent users, read/write ratio). Maintainability: operability, simplicity, evolvability over time.", tags: ["ddia", "foundation"] },
      { name: "Storage Engines: Log-Structured vs Page-Oriented", def: "Log-structured (LSM-Trees): fast writes (append-only), slower reads (merge compaction). Used by Cassandra, RocksDB, Kafka. Page-oriented (B-Trees): fast reads (O(log n)), slower writes (in-place update). Used by PostgreSQL, MySQL InnoDB. Choose based on write-heavy vs read-heavy workload.", tags: ["ddia", "database"] },
      { name: "B-Trees vs LSM-Trees", def: "B-Tree: reads faster, writes involve random I/O (write amplification), predictable latency. LSM-Tree: writes faster (sequential append), reads slower (may check multiple levels), compaction pauses. B-Tree write amplification: every write may update multiple pages. LSM compaction amplification: data rewritten multiple times during merges.", tags: ["ddia", "database"] },
      { name: "OLTP vs OLAP", def: "OLTP (Online Transaction Processing): low-latency, high-concurrency, small queries on individual records (user-facing). OLAP (Online Analytical Processing): bulk queries on large datasets, aggregates, analytical dashboards. Separate systems: OLTP → PostgreSQL/MySQL, OLAP → Redshift/BigQuery/Snowflake. ETL moves data between them.", tags: ["ddia", "database"] },
      { name: "Column-Oriented Storage", def: "Store all values of a column together instead of row-by-row. Compressed efficiently (many repeated values). Dramatically faster for analytical queries that scan few columns of many rows. Parquet, ORC formats. BigQuery, Redshift, ClickHouse use columnar storage. Not good for OLTP (writing a row touches many column files).", tags: ["ddia", "database"] },
      { name: "Write-Ahead Log (WAL)", def: "Every DB change appended to a log BEFORE it's applied to data files. On crash, replay WAL to recover. Foundation of PostgreSQL, MySQL, Kafka (log is the primary data structure). Also enables replication: ship WAL to replicas. LSM-tree memtable is also WAL-backed.", tags: ["ddia", "database"] },
      { name: "Replication Strategies", def: "Single-leader: all writes to primary, replicated to followers (most common). Multi-leader: writes at multiple datacenters, conflict resolution needed. Leaderless (Dynamo-style): client writes to N nodes, quorum (W+R > N) for consistency. Each trades off: simplicity vs availability vs conflict complexity.", tags: ["ddia", "distributed"] },
      { name: "Replication Lag & Read-Your-Writes", def: "Async replication: follower may be seconds behind leader. Read-your-writes consistency: after writing, user sees their own write (route their reads to leader for 1 min after write). Monotonic reads: always read from same replica per session. Consistent prefix reads: causally related writes appear in order.", tags: ["ddia", "distributed"] },
      { name: "Partitioning (Sharding) Strategies", def: "By key range (lexicographic, allows range queries but risks hot spots). By hash of key (even distribution, kills range queries). Consistent hashing: add/remove nodes with minimal redistribution. Compound key partitioning: (userId, timestamp) — partition by userId, sort by timestamp within partition (Cassandra approach).", tags: ["ddia", "database", "distributed"] },
      { name: "Hot Spots & Skewed Workloads", def: "Hot spot: one partition gets disproportionate traffic (celebrity tweet, trending product). Fix: add random suffix to partition key (spreads writes across N partitions, but reads must query all N and merge). DDIA calls this the 'celebrity problem'. Pre-sharding helps if you can predict access patterns.", tags: ["ddia", "database"] },
      { name: "Serializable Snapshot Isolation (SSI)", def: "Optimistic concurrency control: transactions proceed without blocking, validated at commit. Detects serialization conflicts (write skew). Better throughput than 2PL under low contention. PostgreSQL 9.1+ uses SSI. Contrast: 2PL (pessimistic, locks, high contention), SSI (optimistic, validates, low contention).", tags: ["ddia", "database", "advanced"] },
      { name: "Write Skew & Phantoms", def: "Write skew: two transactions read same data, both decide to write based on what they read, final state violates invariant. Example: two on-call doctors both go off-call simultaneously. Phantom: transaction queries, another inserts matching row. Fixed by SERIALIZABLE isolation or materializing conflicts.", tags: ["ddia", "database"] },
      { name: "Distributed Transactions (2PC)", def: "Coordinator sends Prepare to all participants. If all OK → Coordinator sends Commit. If any fail → Coordinator sends Abort. Problem: coordinator crashes after Prepare but before Commit — participants stuck in doubt (blocking protocol). 3PC or Paxos/Raft overcome this.", tags: ["ddia", "distributed"] },
      { name: "Linearizability", def: "Strongest consistency guarantee: system behaves as if there is only one copy of data, and every operation appears atomic. Once a write completes, all subsequent reads see that value. Very expensive: requires coordination (Raft/Paxos). Most systems offer weaker guarantees (eventual consistency, causal consistency).", tags: ["ddia", "distributed"] },
      { name: "Causal Consistency", def: "Causally related operations appear in causal order to all nodes. If you see effect, you also see cause. Stronger than eventual consistency but weaker than linearizability. Implemented via version vectors or Lamport clocks. Git's DAG, Kafka's ordered partitions are causally consistent.", tags: ["ddia", "distributed"] },
      { name: "Lamport Clocks & Vector Clocks", def: "Lamport clock: logical counter incremented on each event, sent with messages (max(local,received)+1). Establishes happens-before ordering. Vector clock: per-node counter array, captures causality precisely. If A's vector ≤ B's vector, A causally precedes B. Used for conflict detection in Dynamo-style systems.", tags: ["ddia", "distributed"] },
      { name: "Consensus (Paxos / Raft)", def: "Agreement among distributed nodes despite failures. Raft (understandable): leader election, log replication. Nodes in majority = quorum. Leader replicates entries, commits when majority acknowledge. Used by etcd (K8s brain), CockroachDB, Kafka KRaft. Paxos: theoretically equivalent but famously hard to understand.", tags: ["ddia", "distributed"] },
      { name: "Stream Processing vs Batch Processing", def: "Batch (MapReduce/Spark): process bounded dataset, minutes to hours delay. Stream (Kafka Streams/Flink): process unbounded dataset event-by-event, milliseconds to seconds delay. Lambda architecture: both in parallel. Kappa architecture: stream-only (reprocess by replaying from Kafka). DDIA recommends stream for most new systems.", tags: ["ddia", "streaming"] },
      { name: "Encoding & Schema Evolution", def: "Forward compatibility: old code reads new data. Backward compatibility: new code reads old data. Avro: schema in registry, compact binary. Protobuf: field numbers (don't reuse deleted ones). JSON: human-readable, no schema enforcement. DDIA: design for schema evolution from day one — rolling upgrades require both backward & forward compatibility.", tags: ["ddia", "design"] },
    ]
  },

  // ─── PRODUCTION ISSUES & SOLUTIONS ───────────────────────────────────
  {
    id: "production-issues",
    title: "Production Issues & Solutions Guide",
    icon: "🚨",
    color: "c3",
    terms: [
      { name: "OutOfMemoryError: Java heap space", def: "CAUSE: memory leak (retained references), unbounded caches, huge data loaded into memory. DIAGNOSE: `-XX:+HeapDumpOnOutOfMemoryError`, analyse dump with Eclipse MAT or JProfiler. FIX: fix leak (WeakReference for caches, clear collections), tune `-Xmx`, process data in streams not all-at-once.", tags: ["production", "java"] },
      { name: "StackOverflowError", def: "CAUSE: infinite recursion (missing base case), excessive recursion depth. DIAGNOSE: stack trace shows repeating method. FIX: add base case, convert to iteration, increase `-Xss` (thread stack size) as last resort. Example: bidirectional JPA entity toString() calling each other recursively.", tags: ["production", "java"] },
      { name: "Connection Pool Exhaustion (HikariCP)", def: "SYMPTOM: requests hang at DB call, `Connection is not available, request timed out after Xms`. CAUSE: long-running queries holding connections, connection leak (not closing), pool too small. FIX: `connectionTimeout`, `maximumPoolSize` tuning, `leakDetectionThreshold=2000`, ensure try-with-resources or Spring @Transactional manages connections.", tags: ["production", "database", "spring"] },
      { name: "N+1 Query in Production", def: "SYMPTOM: slow endpoint, DB shows thousands of identical SELECT queries per request. DIAGNOSE: Hibernate `show_sql=true` or slow query log. FIX: `@EntityGraph`, JOIN FETCH, batch fetching `@BatchSize(size=20)`, or rewrite as DTO projection with single JOIN query. Never load collections in loops.", tags: ["production", "database"] },
      { name: "Deadlock in Database", def: "SYMPTOM: `com.mysql.jdbc.exceptions.jdbc4.MySQLTransactionRollbackException: Deadlock found`. CAUSE: two transactions acquire locks in different order. DIAGNOSE: `SHOW ENGINE INNODB STATUS`. FIX: consistent lock ordering across transactions, keep transactions short, use optimistic locking (`@Version`) for low-contention scenarios.", tags: ["production", "database"] },
      { name: "Kafka Consumer Lag Growing", def: "SYMPTOM: consumers can't keep up with producers, lag increases. CAUSE: slow processing, too few partitions, deserialization errors causing retries. DIAGNOSE: Kafka consumer group lag metrics in Datadog/Grafana. FIX: add consumers (up to partition count), parallelise processing, increase partition count, fix slow logic, handle poison pills via DLQ.", tags: ["production", "kafka"] },
      { name: "Kafka Consumer Rebalancing Loop", def: "SYMPTOM: consumers constantly rebalancing, no progress. CAUSE: max.poll.interval.ms exceeded (processing takes too long), session.timeout.ms too short, consumer crashes. FIX: increase `max.poll.interval.ms`, reduce `max.poll.records`, process async with bounded queue, fix crashes that cause clean shutdown.", tags: ["production", "kafka"] },
      { name: "Circuit Breaker Opens in Production", def: "SYMPTOM: requests fail fast with fallback response, downstream service overwhelmed. DIAGNOSE: Resilience4j metrics — failure rate threshold hit. FIX: investigate downstream service health, check timeout settings (too tight?), review error type (4xx shouldn't trip breaker), tune `minimumNumberOfCalls` and `slidingWindowSize` thresholds.", tags: ["production", "microservices"] },
      { name: "JWT Token Expiry Issues", def: "SYMPTOM: users suddenly logged out, 401 errors after token expiry. FIX: implement refresh token flow (short-lived access token 15min + long-lived refresh token 7 days in HttpOnly cookie). On 401, client silently calls /refresh. Validate refresh token server-side (store in Redis for revocation ability).", tags: ["production", "security"] },
      { name: "Slow API Response in Production", def: "DIAGNOSE (in order): 1. Check /actuator/metrics for request percentiles. 2. Check GC pause time. 3. Check thread pool saturation. 4. Enable SQL slow query log. 5. Check external service latency (Kafka, Redis, downstream APIs). 6. Distributed trace (Jaeger) to find slowest span. Fix the actual bottleneck, not symptoms.", tags: ["production", "performance"] },
      { name: "Memory Leak in Spring Boot", def: "COMMON CAUSES: ThreadLocal not cleared in thread pools, unclosed Hibernate sessions, static collection growing unbounded, ClassLoader leak from dynamic loading, unclosed HTTP connections. DIAGNOSE: heap dump analysis (dominator tree). FIX pattern: WeakHashMap for caches, explicit null in finally blocks, connection pool with leak detection.", tags: ["production", "java", "spring"] },
      { name: "Redis Connection Issues", def: "SYMPTOM: `RedisConnectionFailureException`, timeouts. CAUSES: connection pool exhausted, network partition, Redis maxclients reached. FIX: Lettuce (default in Spring) uses connection multiplexing (far fewer connections than Jedis). Set `spring.redis.lettuce.pool.max-active`, add retry logic, circuit breaker around Redis calls.", tags: ["production", "spring"] },
      { name: "Spring Transaction Not Rolling Back", def: "COMMON CAUSES: 1. @Transactional on private method (proxy bypass). 2. Self-invocation (`this.method()` skips proxy). 3. Checked exception not in rollbackFor list. 4. @Transactional on wrong layer. FIX: ensure @Transactional on public methods called from outside the bean, use `rollbackFor=Exception.class` explicitly.", tags: ["production", "spring"] },
      { name: "Container OOMKilled in Kubernetes", def: "SYMPTOM: pod crashes with `OOMKilled` exit code 137. CAUSE: container exceeded memory limit. DIAGNOSE: `kubectl describe pod <name>` → last state reason. FIX: 1. Tune JVM heap: `-Xmx` should be 70-80% of container memory limit. 2. Account for off-heap (Metaspace, threads, NIO). 3. Increase memory limit. 4. Fix Java memory leak.", tags: ["production", "kubernetes", "java"] },
      { name: "Distributed Tracing Missing Spans", def: "SYMPTOM: trace shows gap, can't see what service X did. CAUSE: context not propagated across thread boundaries (async code, Kafka, manual threads). FIX: use OpenTelemetry instrumentation which handles context propagation. For manual: `Span span = tracer.currentSpan(); new Thread(() -> { try(Scope s = tracer.withSpan(span)) {...} }).start()`.", tags: ["production", "observability"] },
      { name: "Graceful Shutdown Issues", def: "SYMPTOM: requests fail during deployment, in-flight requests lost. FIX: 1. Spring Boot: `server.shutdown=graceful`, `spring.lifecycle.timeout-per-shutdown-phase=30s`. 2. K8s: `preStop` hook with `sleep 5` to allow load balancer to drain. 3. Kafka: commit offsets before shutdown. 4. ExecutorService: `awaitTermination()` in `@PreDestroy`.", tags: ["production", "devops", "spring"] },
      { name: "Idempotency in Payment APIs", def: "PROBLEM: network retry causes double charge. FIX: client generates UUID idempotency key per operation. Server: `INSERT INTO idempotency_keys(key, response) VALUES(?,?) ON CONFLICT DO NOTHING`. If exists, return stored response. Store with 24h TTL. Key stored in same DB transaction as business operation (atomicity).", tags: ["production", "fintech", "design"] },
    ]
  },

  // ─── DEVELOPER GUIDE: BEST PRACTICES ─────────────────────────────────
  {
    id: "dev-guide",
    title: "Developer Guide — Best Practices & Principles",
    icon: "📐",
    color: "c1",
    terms: [
      { name: "Clean Code Principles (Uncle Bob)", def: "Functions: do one thing, < 20 lines. Names: reveal intent (getUserById not getU). Comments: only why, never what (code explains what). DRY: don't repeat yourself. YAGNI: you ain't gonna need it. Boy Scout Rule: leave code cleaner than you found it. Fail fast: validate at boundaries.", tags: ["dev-guide", "principles"] },
      { name: "Code Review Checklist", def: "✓ Does it do what the ticket says? ✓ Edge cases handled? ✓ Tests added? ✓ No new N+1 queries? ✓ No secrets committed? ✓ Exception handling correct? ✓ Logging appropriate (not too much, not too little)? ✓ Thread safety if shared? ✓ Breaking API changes? ✓ Migrations reversible?", tags: ["dev-guide", "practices"] },
      { name: "API Design Best Practices", def: "Nouns not verbs in URLs: /users/123 not /getUser/123. Consistent naming (snake_case or camelCase — pick one). Pagination on all list endpoints: `?page=0&size=20`. Versioning from day 1: /api/v1/. Always return meaningful error bodies (code, message, timestamp). Never 200 OK with error in body.", tags: ["dev-guide", "api"] },
      { name: "Error Handling Strategy", def: "Fail fast at entry (validate input, throw early). Throw specific exceptions (InsufficientFundsException, not RuntimeException). Catch at boundaries (controller layer). Never swallow exceptions (empty catch). Log with context (userId, requestId). Return client-friendly messages, log internal details. Use problem+json RFC 7807 format.", tags: ["dev-guide", "practices"] },
      { name: "Logging Best Practices", def: "Structured JSON logs (key-value pairs). Include: requestId, userId, service, duration, result. Levels: ERROR (needs action), WARN (unexpected but handled), INFO (business events), DEBUG (dev only). Never log passwords/tokens/PII. Correlation ID through all services. Use SLF4J + Logback, not System.out.println.", tags: ["dev-guide", "observability"] },
      { name: "Configuration Management", def: "Never hardcode: URLs, timeouts, limits, credentials. Use environment variables for secrets (12-Factor). application.yml for non-secret config. Spring Cloud Config for centralised config. Validate config at startup (fail fast if DB_URL missing). Document all env vars in README.", tags: ["dev-guide", "devops"] },
      { name: "Database Migration Safety", def: "Blue-green DB migration: 1. Add new column (nullable). 2. Deploy code that writes both old+new. 3. Backfill old data. 4. Deploy code that reads new column. 5. Make column non-nullable. 6. Remove old column in next release. Never rename a column in one step — breaks rolling deploy.", tags: ["dev-guide", "database"] },
      { name: "Defensive Programming", def: "Validate inputs at system boundaries. Never trust user input. Never trust external API responses (validate schema). Use Optional instead of null. Fail fast: throw early if invariant violated. Design for the sad path as much as the happy path. Assume the network will fail, disk will fill, DB will be slow.", tags: ["dev-guide", "principles"] },
      { name: "Performance First Principles", def: "Measure before optimising (profiler, not intuition). Optimise the biggest bottleneck first. Algorithmic improvement beats micro-optimisation. Caching beats recomputing. Async beats blocking. Index the query, don't rewrite the ORM. Read access patterns first, then design data model around them.", tags: ["dev-guide", "performance"] },
      { name: "Dependency Management", def: "Use dependency management (Maven BOM / Gradle platform). Pin transitive dependencies causing CVEs. Regular `mvn dependency:analyze` — remove unused. `mvn versions:display-dependency-updates` to track staleness. Spring Boot BOM manages compatible versions — stick to it. Avoid SNAPSHOT dependencies in production.", tags: ["dev-guide", "java"] },
      { name: "Service Layer Design", def: "Services: business logic only, no HTTP concerns. Repositories: data access only. Controllers: HTTP mapping only. No business logic in controllers. No DB calls in controllers. Services don't know about HTTP status codes. This separation enables unit testing services without Spring context.", tags: ["dev-guide", "spring", "design"] },
      { name: "Idempotent Operation Design", def: "Design all write operations to be safely retried. POST /payments with idempotency-key header. PUT is idempotent by definition. Use conditional updates: `UPDATE ... WHERE version=X`. Event consumers deduplicate on event ID. Enables retry-safe clients and automatic error recovery.", tags: ["dev-guide", "design", "fintech"] },
      { name: "Health Check Design", def: "Liveness: can the app process requests? (simple: return 200). Readiness: are all dependencies available? (check DB, Redis, downstream services). Don't make liveness depend on external services — cascade failure kills all pods. Separate liveness (restart) from readiness (traffic removal).", tags: ["dev-guide", "devops", "spring"] },
      { name: "Timeout Strategy", def: "Every external call must have a timeout: HTTP client, DB query, Kafka consumer poll, Redis operation. Rule of thumb: P99 latency of dependency × 3. Cascade: API timeout > service timeout > DB timeout. Circuit breaker wraps timeout. Without timeouts, one slow dependency hangs all threads forever.", tags: ["dev-guide", "reliability"] },
      { name: "Secret Zero Problem", def: "How does your app get its first secret (DB password) securely? Options: 1. K8s Secret (encrypted at rest in etcd). 2. HashiCorp Vault with K8s auth (pod's service account token authenticates). 3. AWS IAM role for pod (IRSA) — no secret needed, IAM auth. Vault is the most robust for production BFSI workloads.", tags: ["dev-guide", "security", "devops"] },
    ]
  },

  // ─── SQL CHEAT SHEET ─────────────────────────────────────────────────
  {
    id: "sql-cheatsheet",
    title: "SQL & Database Cheat Sheet",
    icon: "🗃️",
    color: "c2",
    terms: [
      { name: "DDL Quick Reference", def: "CREATE TABLE users (id BIGINT PRIMARY KEY GENERATED ALWAYS AS IDENTITY, name VARCHAR(100) NOT NULL, email VARCHAR(255) UNIQUE NOT NULL, created_at TIMESTAMPTZ DEFAULT NOW()). ALTER TABLE users ADD COLUMN status VARCHAR(20) DEFAULT 'ACTIVE'. DROP TABLE IF EXISTS temp_users. CREATE INDEX CONCURRENTLY idx_users_email ON users(email).", tags: ["sql", "cheatsheet"] },
      { name: "DML Quick Reference", def: "INSERT INTO accounts(user_id, balance) VALUES(1, 1000.00) ON CONFLICT(user_id) DO UPDATE SET balance=EXCLUDED.balance. UPDATE accounts SET balance=balance-100 WHERE id=1 AND balance>=100. DELETE FROM sessions WHERE expires_at < NOW(). TRUNCATE TABLE audit_log RESTART IDENTITY.", tags: ["sql", "cheatsheet"] },
      { name: "Advanced SELECT Patterns", def: "Pagination: `SELECT * FROM orders ORDER BY id LIMIT 20 OFFSET 0` (slow for large offsets). Keyset: `SELECT * FROM orders WHERE id > :lastId ORDER BY id LIMIT 20` (fast). Count total: `SELECT COUNT(*) OVER() AS total, * FROM orders WHERE user_id=1 LIMIT 20`. Distinct on: `SELECT DISTINCT ON (user_id) * FROM orders ORDER BY user_id, created_at DESC`.", tags: ["sql", "cheatsheet"] },
      { name: "Window Functions", def: "ROW_NUMBER() OVER(PARTITION BY dept ORDER BY salary DESC) — rank within group. LAG(salary,1) OVER(ORDER BY date) — previous row value. LEAD(salary,1) OVER(ORDER BY date) — next row. SUM(amount) OVER(PARTITION BY user_id ORDER BY date ROWS UNBOUNDED PRECEDING) — running total. NTILE(4) OVER(...) — quartile.", tags: ["sql", "cheatsheet"] },
      { name: "Common Table Expressions (CTE)", def: "WITH active_users AS (SELECT id FROM users WHERE status='ACTIVE'), orders AS (SELECT * FROM order_table WHERE user_id IN (SELECT id FROM active_users)) SELECT u.name, COUNT(o.id) FROM active_users u JOIN orders o ON o.user_id=u.id GROUP BY u.name. Recursive CTE for hierarchical data (org charts, categories).", tags: ["sql", "cheatsheet"] },
      { name: "Aggregate Functions", def: "COUNT(*) vs COUNT(col) (skips NULLs). SUM, AVG, MIN, MAX. GROUP BY required for aggregates with non-aggregated columns. HAVING filters aggregated results (HAVING COUNT(*) > 5). FILTER clause: `COUNT(*) FILTER (WHERE status='ACTIVE')`. GROUP_CONCAT / STRING_AGG for concatenating grouped strings.", tags: ["sql", "cheatsheet"] },
      { name: "Indexes Cheat Sheet", def: "CREATE INDEX ON orders(user_id). Composite: CREATE INDEX ON orders(user_id, status) — works for queries on (user_id) or (user_id, status), not (status) alone. Partial: CREATE INDEX ON orders(user_id) WHERE status='PENDING'. EXPLAIN ANALYZE to verify index is used. DROP unused indexes (they slow writes).", tags: ["sql", "cheatsheet", "performance"] },
      { name: "Transaction Patterns", def: "BEGIN; SELECT balance FROM accounts WHERE id=1 FOR UPDATE; -- row-level lock UPDATE accounts SET balance=balance-100 WHERE id=1; UPDATE accounts SET balance=balance+100 WHERE id=2; COMMIT; -- For optimistic locking: UPDATE accounts SET balance=b, version=version+1 WHERE id=1 AND version=:expectedVersion; -- check rows affected = 1", tags: ["sql", "cheatsheet"] },
      { name: "Upsert Patterns", def: "PostgreSQL: `INSERT INTO t(id,val) VALUES(1,'x') ON CONFLICT(id) DO UPDATE SET val=EXCLUDED.val`. MySQL: `INSERT INTO t(id,val) VALUES(1,'x') ON DUPLICATE KEY UPDATE val=VALUES(val)`. MERGE statement (SQL Server, Oracle). Spring Data: `save()` uses merge — check if it generates UPDATE or INSERT via SQL logging.", tags: ["sql", "cheatsheet"] },
      { name: "EXPLAIN ANALYZE Guide", def: "`EXPLAIN (ANALYZE, BUFFERS, FORMAT JSON) SELECT ...`. Look for: Seq Scan on large table (add index), Hash Join vs Nested Loop (NL bad for large tables), rows estimate vs actual (stale statistics, run ANALYZE), Buffers hit vs read (cache effectiveness). Use `pg_stat_statements` for finding slowest queries in production.", tags: ["sql", "cheatsheet", "performance"] },
      { name: "JSON in PostgreSQL", def: "JSONB (binary, indexed, faster queries) vs JSON (text, insertion order preserved). Query: `data->>'name'` (text), `data->'address'->>'city'` (nested). Contains: `data @> '{\"active\":true}'`. Index: `CREATE INDEX ON users USING GIN(data)`. Update: `UPDATE t SET data = data || '{\"status\":\"active\"}' WHERE id=1`.", tags: ["sql", "cheatsheet"] },
      { name: "Database Anti-Patterns", def: "1. SELECT * (fetches unnecessary data, breaks if schema changes). 2. NOT IN with subquery (slow, fails with NULLs). 3. OR in WHERE (prevents index use — use UNION). 4. Implicit type coercion in WHERE clause. 5. Using functions on indexed column: `WHERE LOWER(email)='x'` (use functional index). 6. Missing indexes on foreign keys. 7. Unbounded queries (no LIMIT).", tags: ["sql", "cheatsheet", "practices"] },
    ]
  },

  // ─── GIT CHEAT SHEET ─────────────────────────────────────────────────
  {
    id: "git-cheatsheet",
    title: "Git & Version Control Cheat Sheet",
    icon: "🔀",
    color: "c3",
    terms: [
      { name: "Git Core Concepts", def: "Working Tree: files on disk. Index/Staging Area: snapshot of next commit. HEAD: pointer to current branch tip. Objects: blob (file), tree (directory), commit (snapshot + metadata). Refs: branches, tags, remotes. Everything content-addressed by SHA-1 hash. Git is a DAG of commit objects.", tags: ["git", "cheatsheet"] },
      { name: "Essential Daily Commands", def: "`git status` — what's changed. `git add -p` — interactive staging (review hunks). `git commit -m 'feat: add payment endpoint'` — commit. `git push origin feature/payment` — push branch. `git pull --rebase` — fetch + rebase (cleaner history than merge). `git stash` / `git stash pop` — shelve uncommitted changes.", tags: ["git", "cheatsheet"] },
      { name: "Branching Strategy", def: "GitFlow: main (prod) + develop + feature/* + release/* + hotfix/*. GitHub Flow: main + short-lived feature branches, deploy on merge. Trunk-Based Development: all devs push to main frequently, use feature flags. For microservices: GitHub Flow / Trunk-Based preferred — simpler, faster CI/CD.", tags: ["git", "cheatsheet", "devops"] },
      { name: "Merge vs Rebase", def: "Merge: creates merge commit, preserves branch history, non-destructive. Rebase: replays commits on top of target branch, linear history, rewrites commit hashes. Rule: never rebase public/shared branches. Use rebase for local feature cleanup before PR. Squash merge: collapses feature into single commit on main.", tags: ["git", "cheatsheet"] },
      { name: "Fixing Mistakes", def: "`git commit --amend` — fix last commit (before push). `git reset HEAD~1 --soft` — undo commit, keep changes staged. `git reset HEAD~1 --hard` — undo commit, discard changes. `git revert <sha>` — safe undo via new commit (use on shared branches). `git reflog` — recover 'lost' commits (keep 90 days).", tags: ["git", "cheatsheet"] },
      { name: "Useful Git Commands", def: "`git log --oneline --graph --all` — visual branch history. `git diff HEAD` — all uncommitted changes. `git bisect start/bad/good` — binary search to find buggy commit. `git cherry-pick <sha>` — apply single commit to current branch. `git blame <file>` — who changed each line. `git shortlog -sn` — commit count by author.", tags: ["git", "cheatsheet"] },
      { name: "Conventional Commits", def: "Format: `type(scope): description`. Types: feat (new feature), fix (bug fix), docs, style, refactor, perf, test, chore, ci. Example: `feat(payment): add idempotency key validation`. Enables auto changelog, semantic versioning, conventional-changelog tooling. Required in many GCC team workflows.", tags: ["git", "cheatsheet", "practices"] },
      { name: ".gitignore Patterns", def: "`*.class` — all .class files. `target/` — Maven build dir. `*.log` — log files. `.env` — secrets file (NEVER commit). `.idea/` — IntelliJ config. `node_modules/`. Use gitignore.io to generate. `git rm --cached <file>` to untrack already-committed file. Secrets committed to git: rotate them immediately.", tags: ["git", "cheatsheet"] },
